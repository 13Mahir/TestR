<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Exam Questions — EMS</title>
  <script src="/static/js/theme.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/static/css/custom.css" />
</head>

<body>
  <div id="sidebar-mount"></div>
  <div id="page-content" class="page-content">

    <div class="d-flex align-items-center justify-content-between mb-3">
      <div class="d-flex align-items-center gap-3">
        <a href="/static/pages/teacher/courses.html" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-arrow-left me-1"></i>Back
        </a>
        <h1 class="page-title mb-0" id="examTitle">
          Exam Questions
        </h1>
      </div>
      <div id="editSettingsBtnContainer">
        <!-- Built dynamically -->
      </div>
    </div>

    <!-- Exam info bar -->
    <div class="content-card mb-3" id="examInfoBar">
      <div class="d-flex justify-content-center py-2">
        <div class="spinner-border spinner-border-sm" role="status"></div>
      </div>
    </div>

    <!-- Global alert -->
    <div id="pageAlert" class="alert d-none mb-3" role="alert"></div>

    <!-- Add question buttons -->
    <div class="d-flex gap-2 mb-3" id="addBtnsRow">
      <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#mcqModal">
        <i class="bi bi-plus-circle me-1"></i>Add MCQ
      </button>
      <button class="btn btn-outline-primary btn-sm" data-bs-toggle="modal" data-bs-target="#subjModal">
        <i class="bi bi-plus-square me-1"></i>Add Subjective
      </button>
      <button class="btn btn-success ms-auto btn-sm" id="publishBtn" onclick="publishExam()">
        <i class="bi bi-send-check me-1"></i>
        <span id="publishBtnText">Publish Exam</span>
        <span id="publishSpinner" class="spinner-border spinner-border-sm
                   d-none ms-1" role="status"></span>
      </button>
    </div>

    <!-- Questions list -->
    <div class="content-card">
      <div class="d-flex justify-content-between
                align-items-center mb-3">
        <span class="small fw-semibold" id="questionCountLabel">Questions</span>
        <span class="small text-muted">
          Total marks: <strong id="totalMarksDisplay">—</strong>
        </span>
      </div>
      <div id="questionsList">
        <div class="text-center text-muted py-4">
          <div class="spinner-border spinner-border-sm" role="status"></div>
        </div>
      </div>
    </div>
  </div>


  <!-- MODAL: Add MCQ Question -->
  <div class="modal fade" id="mcqModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add MCQ Question</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="mcqAlert" class="alert d-none" role="alert"></div>
          <form id="mcqForm" novalidate>
            <div class="mb-3">
              <label class="form-label fw-medium">
                Question Text
              </label>
              <textarea class="form-control" id="mcqText" rows="2" required placeholder="Enter the question...">
            </textarea>
              <div class="invalid-feedback">Required.</div>
            </div>
            <div class="row g-2 mb-3">
              <div class="col-sm-4">
                <label class="form-label fw-medium small">
                  Marks
                </label>
                <input type="number" class="form-control" id="mcqMarks" step="0.5" min="0.5" value="1" required />
              </div>
              <div class="col-sm-4">
                <label class="form-label fw-medium small">
                  Order Index
                </label>
                <input type="number" class="form-control" id="mcqOrder" min="0" value="0" />
              </div>
            </div>

            <!-- 4 options, radio to mark correct -->
            <p class="small fw-medium mb-2">
              Options — select the correct answer:
            </p>
            <div class="d-flex flex-column gap-2" id="mcqOptions">
              <!-- Built dynamically -->
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" id="mcqSubmitBtn" onclick="submitMcq()">
            <span id="mcqBtnText">Add Question</span>
            <span id="mcqSpinner" class="spinner-border spinner-border-sm
                       d-none ms-1" role="status"></span>
          </button>
        </div>
      </div>
    </div>
  </div>


  <!-- MODAL: Add Subjective Question -->
  <div class="modal fade" id="subjModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add Subjective Question</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="subjAlert" class="alert d-none" role="alert"></div>
          <form id="subjForm" novalidate>
            <div class="mb-3">
              <label class="form-label fw-medium">
                Question Text
              </label>
              <textarea class="form-control" id="subjText" rows="3" required placeholder="Describe the question...">
            </textarea>
              <div class="invalid-feedback">Required.</div>
            </div>
            <div class="row g-2 mb-3">
              <div class="col-sm-4">
                <label class="form-label fw-medium small">
                  Marks
                </label>
                <input type="number" class="form-control" id="subjMarks" step="0.5" min="0.5" value="10" required />
              </div>
              <div class="col-sm-4">
                <label class="form-label fw-medium small">
                  Order Index
                </label>
                <input type="number" class="form-control" id="subjOrder" min="0" value="0" />
              </div>
              <div class="col-sm-4">
                <label class="form-label fw-medium small">
                  Word Limit
                  <span class="text-muted">(optional)</span>
                </label>
                <input type="number" class="form-control" id="subjWordLimit" min="10" placeholder="e.g. 300" />
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" id="subjSubmitBtn" onclick="submitSubjective()">
            <span id="subjBtnText">Add Question</span>
            <span id="subjSpinner" class="spinner-border spinner-border-sm
                       d-none ms-1" role="status"></span>
          </button>
        </div>
      </div>
    </div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/sidebar.js"></script>
  <script src="/static/js/notifications.js"></script>
  <script src="/static/js/utils.js"></script>
  <script src="/static/js/teacher/exam_questions.js"></script>
</body>

</html>
