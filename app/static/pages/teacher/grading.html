<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Grading — EMS</title>
  <script src="/static/js/theme.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/static/css/custom.css" />
</head>

<body>
  <div id="sidebar-mount"></div>
  <div id="page-content" class="page-content">
    <div id="notification-bar" class="notification-bar"></div>

    <div class="d-flex align-items-center gap-3 mb-3">
      <a href="/static/pages/teacher/gradebook.html" id="backToGradebook" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Grade Book
      </a>
      <h1 class="page-title mb-0" id="pageTitle">Grading</h1>
    </div>

    <div id="pageAlert" class="alert d-none mb-3" role="alert"></div>

    <!-- Exam picker -->
    <div class="content-card mb-3" id="examPickerCard">
      <label class="form-label fw-medium small">Select Exam</label>
      <div class="d-flex gap-2">
        <select class="form-select form-select-sm" id="examPicker" style="max-width:400px">
          <option value="">Loading exams...</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="loadFromPicker()">View</button>
      </div>
    </div>

    <div class="row g-3 d-none" id="gradingContent">

      <!-- Left: attempt list -->
      <div class="col-12 col-lg-4">
        <div class="content-card h-100">
          <h6 class="fw-semibold mb-3">Student Attempts</h6>
          <div id="attemptList">
            <div class="text-center text-muted py-3">
              <div class="spinner-border spinner-border-sm" role="status"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right: answer detail -->
      <div class="col-12 col-lg-8">
        <div class="content-card" id="answerPanel">
          <div class="text-center text-muted py-5">
            <i class="bi bi-arrow-left-circle fs-2 d-block
                    mb-2 opacity-50"></i>
            Select a student to view their answers.
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/sidebar.js"></script>
  <script src="/static/js/notifications.js"></script>

  <script>
    const urlP = new URLSearchParams(window.location.search);
    let examId = parseInt(urlP.get("exam_id")) || null;
    let selectedAttemptId = null;

    // Update back link with exam_id
    if (examId) {
      document.getElementById("backToGradebook").href = `/static/pages/teacher/gradebook.html?exam_id=${examId}`;
    } else {
      document.getElementById("backToGradebook").href = `/static/pages/teacher/gradebook.html`;
    }

    (function () {
      const prev = window.__onAuthReady;
      window.__onAuthReady = async function (user) {
        if (typeof prev === "function") await prev(user);
        await loadExamPicker();
        if (examId) {
          document.getElementById("examPicker").value = examId;
          document.getElementById("gradingContent").classList.remove("d-none");
          await loadAttempts();
        }
      };
    })();

    async function loadExamPicker() {
      try {
        const data = await window.apiFetch("/api/teacher/exams?page_size=100");
        if (!data) return;
        const picker = document.getElementById("examPicker");
        picker.innerHTML = `<option value="">— Select an exam —</option>` + data.items.map(e =>
          `<option value="${e.id}" ${e.id === examId ? 'selected' : ''}>${_esc(e.course_code)} — ${_esc(e.title)}</option>`
        ).join("");
      } catch (_) { }
    }

    function loadFromPicker() {
      const val = document.getElementById("examPicker").value;
      if (!val) return;
      examId = parseInt(val);
      history.replaceState(null, "", `?exam_id=${examId}`);
      document.getElementById("backToGradebook").href = `/static/pages/teacher/gradebook.html?exam_id=${examId}`;
      document.getElementById("gradingContent").classList.remove("d-none");
      loadAttempts();
    }

    // ── Attempt list ──────────────────────────────────────────────────

    async function loadAttempts() {
      const container = document.getElementById("attemptList");
      try {
        const data = await window.apiFetch(
          `/api/teacher/exams/${examId}/attempts`
        );
        if (!data) return;

        // Update page title with exam info if we can get it
        try {
          const exam = await window.apiFetch(
            `/api/teacher/exams/${examId}`
          );
          if (exam) {
            document.getElementById("pageTitle").textContent =
              `Grading — ${exam.title}`;
            document.title = `Grading: ${exam.title} — EMS`;
          }
        } catch (_) { }

        if (!data.items.length) {
          container.innerHTML = `
        <p class="text-muted small text-center py-3">
          No students enrolled.
        </p>`;
          return;
        }

        container.innerHTML = data.items.map(s => `
      <div class="d-flex align-items-start gap-2 p-2 rounded
                  mb-1 attempt-row"
           style="cursor:pointer"
           id="row_${s.attempt_id || 'na_' + s.student_id}"
           onclick="selectAttempt(
             ${s.attempt_id},
             '${_esc(s.student_email)}',
             '${_esc(s.student_name)}'
           )">
        <div class="flex-fill min-w-0">
          <div class="small fw-medium text-truncate">
            ${_esc(s.student_email)}
          </div>
          <div class="d-flex gap-1 flex-wrap mt-1">
            <span class="badge ${_statusBadge(s.status)} small">
              ${s.status.replace(/_/g, " ")}
            </span>
            ${s.violation_count > 0
            ? `<span class="badge bg-danger-subtle
                              text-danger small">
                   <i class="bi bi-exclamation-triangle me-1"></i>
                   ${s.violation_count} violation${s.violation_count !== 1 ? 's' : ''}
                 </span>`
            : ""}
            ${s.is_fully_graded && s.attempt_id
            ? `<span class="badge bg-success-subtle
                              text-success small">
                   <i class="bi bi-check-circle me-1"></i>Graded
                 </span>`
            : ""}
          </div>
          ${s.attempt_id
            ? `<div class="small text-muted mt-1">
                 MCQ: ${s.mcq_marks} +
                 Subj: ${s.subjective_marks} =
                 <strong>${s.total_marks_awarded}</strong>
               </div>`
            : ""}
        </div>
      </div>`).join("");

      } catch (err) {
        container.innerHTML = `
      <p class="text-danger small">
        ${_esc(err.detail || "Failed to load attempts.")}
      </p>`;
      }
    }

    function _statusBadge(status) {
      const map = {
        submitted: "bg-success-subtle text-success",
        auto_submitted: "bg-warning-subtle text-warning",
        in_progress: "bg-info-subtle text-info",
        not_attempted: "bg-secondary-subtle text-secondary",
      };
      return map[status] || "bg-secondary-subtle text-secondary";
    }

    // ── Select student attempt ────────────────────────────────────────

    async function selectAttempt(attemptId, email, name) {
      if (!attemptId) {
        document.getElementById("answerPanel").innerHTML = `
      <div class="text-center text-muted py-5">
        <i class="bi bi-journal-x fs-2 d-block
                  mb-2 opacity-50"></i>
        <strong>${_esc(email)}</strong> did not attempt this exam.
      </div>`;
        return;
      }

      selectedAttemptId = attemptId;

      // Highlight selected row
      document.querySelectorAll(".attempt-row").forEach(r =>
        r.classList.remove("bg-primary-subtle")
      );
      const rowId = `row_${attemptId}`;
      const row = document.getElementById(rowId);
      if (row) row.classList.add("bg-primary-subtle");

      const panel = document.getElementById("answerPanel");
      panel.innerHTML = `
    <div class="text-center py-3">
      <div class="spinner-border spinner-border-sm"
           role="status"></div>
    </div>`;

      try {
        const data = await window.apiFetch(
          `/api/teacher/exams/${examId}/attempts/${attemptId}`
        );
        if (!data) return;

        panel.innerHTML = `
      <div class="d-flex justify-content-between
                  align-items-center mb-3">
        <div>
          <h6 class="fw-semibold mb-0">${_esc(email)}</h6>
          <small class="text-muted">${_esc(name)}</small>
        </div>
        <span class="small text-muted">
          ${data.total} answer${data.total !== 1 ? "s" : ""}
        </span>
      </div>
      <div id="answersContainer">
        ${data.items.map((a, i) =>
          _renderAnswer(a, i + 1)
        ).join("")}
      </div>`;

      } catch (err) {
        panel.innerHTML = `
      <div class="text-danger small text-center py-3">
        ${_esc(err.detail || "Failed to load answers.")}
      </div>`;
      }
    }

    // ── Render a single answer ────────────────────────────────────────

    function _renderAnswer(a, num) {
      const isMcq = a.question_type === "mcq";
      const isSubj = a.question_type === "subjective";

      let answerHtml = "";

      if (isMcq) {
        answerHtml = `
      <div class="d-flex gap-2 flex-wrap">
        <div class="small">
          Selected:
          <span class="badge ${a.is_correct
            ? 'bg-success' : 'bg-danger'} ms-1">
            ${a.selected_label
            ? _esc(a.selected_label) + '. '
            + _esc(a.selected_text || '')
            : 'Not answered'}
          </span>
        </div>
        <div class="small">
          Correct:
          <span class="badge bg-success-subtle
                        text-success ms-1">
            ${_esc(a.correct_label || '—')}
          </span>
        </div>
        <div class="small">
          Marks:
          <strong class="${a.is_correct
            ? 'text-success' : 'text-danger'}">
            ${a.marks_awarded !== null
            ? a.marks_awarded : '0'}
            / ${a.marks_available}
          </strong>
        </div>
      </div>`;
      }

      if (isSubj) {
        answerHtml = `
      <div class="mb-2">
        <div class="p-2 rounded border bg-body-secondary
                    small mb-2"
             style="min-height:60px;white-space:pre-wrap">
          ${a.subjective_text
            ? _esc(a.subjective_text)
            : '<span class="text-muted fst-italic">'
            + 'No answer provided.</span>'}
        </div>
        ${a.word_limit
            ? `<div class="small text-muted mb-2">
               Word limit: ${a.word_limit}
             </div>`
            : ""}
        <!-- Grading form -->
        <div class="d-flex align-items-end gap-2 flex-wrap">
          <div>
            <label class="form-label small fw-medium mb-1">
              Marks (0 – ${a.marks_available})
            </label>
            <input type="number"
                   class="form-control form-control-sm"
                   id="marks_${a.answer_id}"
                   min="0" max="${a.marks_available}"
                   step="0.5"
                   value="${a.marks_awarded !== null
            ? a.marks_awarded : ''}"
                   placeholder="0"
                   style="width:90px"/>
          </div>
          <div class="flex-fill">
            <label class="form-label small fw-medium mb-1">
              Feedback <span class="text-muted">(optional)</span>
            </label>
            <input type="text"
                   class="form-control form-control-sm"
                   id="feedback_${a.answer_id}"
                   value="${_esc(a.teacher_feedback || '')}"
                   placeholder="Optional comment..."/>
          </div>
          <button class="btn btn-primary btn-sm"
                  id="gradeBtn_${a.answer_id}"
                  onclick="submitGrade(
                    ${a.answer_id},
                    ${a.marks_available}
                  )">
            ${a.is_graded ? 'Update' : 'Save'} Grade
          </button>
        </div>
        ${a.is_graded
            ? `<div class="small text-success mt-1">
               <i class="bi bi-check-circle me-1"></i>
               Graded: ${a.marks_awarded} / ${a.marks_available}
             </div>`
            : ""}
      </div>`;
      }

      return `
    <div class="border rounded p-3 mb-3
                ${isMcq
          ? 'border-primary-subtle'
          : 'border-warning-subtle'}">
      <div class="d-flex align-items-center gap-2 mb-2">
        <span class="badge ${isMcq
          ? 'bg-primary' : 'bg-warning text-dark'} small">
          Q${num} · ${isMcq ? 'MCQ' : 'Subjective'}
        </span>
        <span class="small text-muted">
          ${a.marks_available} mark${a.marks_available !== 1 ? 's' : ''}
        </span>
      </div>
      <p class="small fw-medium mb-2">
        ${_esc(a.question_text)}
      </p>
      ${answerHtml}
    </div>`;
    }

    // ── Submit grade ──────────────────────────────────────────────────

    async function submitGrade(answerId, maxMarks) {
      const marksInput = document.getElementById(
        `marks_${answerId}`
      );
      const feedbackInput = document.getElementById(
        `feedback_${answerId}`
      );
      const btn = document.getElementById(
        `gradeBtn_${answerId}`
      );

      const marks = parseFloat(marksInput.value);
      if (isNaN(marks) || marks < 0 || marks > maxMarks) {
        alert(`Marks must be between 0 and ${maxMarks}.`);
        return;
      }

      const origText = btn.textContent;
      btn.disabled = true;
      btn.textContent = "Saving...";

      try {
        await window.apiFetch(
          `/api/teacher/exams/${examId}/grade/`
          + `${selectedAttemptId}/${answerId}`,
          {
            method: "POST",
            body: JSON.stringify({
              marks_awarded: marks,
              feedback: feedbackInput.value.trim() || null,
            }),
          }
        );
        btn.textContent = "✓ Saved";
        btn.classList.replace("btn-primary", "btn-success");
        setTimeout(() => {
          btn.disabled = false;
          btn.textContent = "Update Grade";
          btn.classList.replace("btn-success", "btn-primary");
        }, 2000);

        // Refresh attempt list to update graded status
        await loadAttempts();

      } catch (err) {
        alert(err.detail || "Failed to save grade.");
        btn.disabled = false;
        btn.textContent = origText;
      }
    }

    // ── Utilities ─────────────────────────────────────────────────────
    function _showPageAlert(msg, type) {
      const el = document.getElementById("pageAlert");
      el.className = `alert alert-${type}`;
      el.textContent = msg;
      el.classList.remove("d-none");
    }

    function _esc(s) {
      return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>

</html>
