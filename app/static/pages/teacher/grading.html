<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Grading — EMS</title>
  <script src="/static/js/theme.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/static/css/custom.css" />
</head>

<body>
  <div id="sidebar-mount"></div>
  <div id="page-content" class="page-content">
    <div id="notification-bar" class="notification-bar"></div>

    <div class="d-flex align-items-center gap-3 mb-3">
      <a href="/static/pages/teacher/gradebook.html" id="backToGradebook" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Grade Book
      </a>
      <h1 class="page-title mb-0" id="pageTitle">Grading</h1>
    </div>

    <div id="pageAlert" class="alert d-none mb-3" role="alert"></div>

    <!-- Exam picker -->
    <div class="content-card mb-3" id="examPickerCard">
      <label class="form-label fw-medium small">Select Exam</label>
      <div class="d-flex gap-2">
        <select class="form-select form-select-sm" id="examPicker" style="max-width:400px">
          <option value="">Loading exams...</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="loadFromPicker()">View</button>
      </div>
    </div>

    <div class="row g-3 d-none" id="gradingContent">

      <!-- Left: attempt list -->
      <div class="col-12 col-lg-4">
        <div class="content-card h-100">
          <h6 class="fw-semibold mb-3">Student Attempts</h6>
          <div id="attemptList">
            <div class="text-center text-muted py-3">
              <div class="spinner-border spinner-border-sm" role="status"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right: answer detail -->
      <div class="col-12 col-lg-8">
        <div class="content-card" id="answerPanel">
          <div class="text-center text-muted py-5">
            <i class="bi bi-arrow-left-circle fs-2 d-block
                    mb-2 opacity-50"></i>
            Select a student to view their answers.
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/sidebar.js"></script>
  <script src="/static/js/notifications.js"></script>
  <script src="/static/js/utils.js"></script>
  <script src="/static/js/teacher/grading.js"></script>
</body>

</html>
