<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Proctor Reports — EMS</title>
  <script src="/static/js/theme.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/static/css/custom.css" />
</head>

<body>
  <div id="sidebar-mount"></div>
  <div id="page-content" class="page-content">
    <div id="notification-bar" class="notification-bar"></div>

    <div class="d-flex align-items-center gap-3 mb-3">
      <h1 class="page-title mb-0" id="pageTitle">Proctor Reports</h1>
    </div>

    <div id="pageAlert" class="alert d-none mb-3" role="alert"></div>

    <!-- Exam picker -->
    <div class="content-card mb-3" id="examPickerCard">
      <label class="form-label fw-medium small">Select Exam</label>
      <div class="d-flex gap-2">
        <select class="form-select form-select-sm" id="examPicker" style="max-width:400px">
          <option value="">Loading exams...</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="loadFromPicker()">
          View Report
        </button>
      </div>
    </div>

    <!-- Proctor report content (hidden until exam selected) -->
    <div id="reportContent" class="d-none">

      <div class="content-card">
        <div class="d-flex justify-content-between
                  align-items-center mb-3">
          <span class="small fw-semibold">Student Violations</span>
        </div>

        <div class="table-responsive-wrapper">
          <table class="table table-hover table-sm align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>#</th>
                <th>Email</th>
                <th>Name</th>
                <th>Status</th>
                <th>Violations</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="reportTableBody">
              <tr>
                <td colspan="6" class="text-center text-muted py-4">
                  Loading...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div><!-- /#reportContent -->
  </div><!-- /#page-content -->

  <!-- Violation Detail Modal -->
  <div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Proctoring Details: <span id="detailStudentName"></span></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-0">
          <div class="row g-0">
            <!-- Timeline -->
            <div class="col-md-5 border-end">
              <div class="p-3 fw-bold border-bottom sticky-top" style="background-color: var(--bs-modal-bg, #212529);">Violation Timeline</div>
              <div id="timelineContainer" class="p-3"></div>
            </div>
            <!-- Snapshot Gallery -->
            <div class="col-md-7">
              <div class="p-3 fw-bold border-bottom sticky-top" style="background-color: var(--bs-modal-bg, #212529);">Camera Snapshots</div>
              <div id="snapshotContainer" class="p-3 d-flex flex-wrap gap-2"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/sidebar.js"></script>
  <script src="/static/js/notifications.js"></script>

  <script>
    const urlP = new URLSearchParams(window.location.search);
    let examId = parseInt(urlP.get("exam_id")) || null;

    (function () {
      const prev = window.__onAuthReady;
      window.__onAuthReady = async function (user) {
        if (typeof prev === "function") await prev(user);
        await loadExamPicker();
        if (examId) {
          document.getElementById("examPicker").value = examId;
          await loadReport(examId);
        }
      };
    })();

    // ── Exam picker ───────────────────────────────────────────────────

    async function loadExamPicker() {
      try {
        const data = await window.apiFetch(
          "/api/teacher/exams?page_size=100"
        );
        if (!data) return;

        const picker = document.getElementById("examPicker");
        picker.innerHTML = `<option value="">— Select an exam —</option>`
          + data.items.map(e =>
            `<option value="${e.id}"
             ${e.id === examId ? 'selected' : ''}>
             ${_esc(e.course_code)} — ${_esc(e.title)}
           </option>`
          ).join("");
      } catch (_) { }
    }

    function loadFromPicker() {
      const val = document.getElementById("examPicker").value;
      if (!val) return;
      examId = parseInt(val);
      history.replaceState(null, "", `?exam_id=${examId}`);
      loadReport(examId);
    }

    // ── Load report ──────────────────────────────────────────────────

    async function loadReport(eid) {
      document.getElementById("reportContent").classList.remove("d-none");
      await loadTable(eid);
    }

    async function loadTable(eid) {
      const tbody = document.getElementById("reportTableBody");
      try {
        const data = await window.apiFetch(
          `/api/teacher/exams/${eid}/attempts`
        );
        if (!data) return;

        if (!data.items.length) {
          tbody.innerHTML = `
        <tr>
          <td colspan="6" class="text-center text-muted py-4">No enrolled students.</td>
        </tr>`;
          return;
        }

        data.items.sort((a, b) => (b.violation_count || 0) - (a.violation_count || 0));

        tbody.innerHTML = data.items.map((e, i) => {
          const vSummary = _formatViolations(e.violation_summary);
          return `
      <tr>
        <td class="text-muted small">${i + 1}</td>
        <td class="small font-monospace">${_esc(e.student_email)}</td>
        <td class="small">${_esc(e.student_name) || "—"}</td>
        <td>
          <span class="badge ${_statusBadge(e.status)} small">
            ${e.status.replace(/_/g, " ")}
          </span>
        </td>
        <td class="small text-center fw-bold text-danger">
          ${e.violation_count > 0
              ? `<span style="cursor:help; border-bottom:1px dotted;" 
                       data-bs-toggle="tooltip" 
                       data-bs-placement="top"
                       title="${_esc(vSummary)}">
                   ${e.violation_count}
                 </span>`
              : '—'}
        </td>
        <td>
          ${e.attempt_id ? `<button class="btn btn-outline-primary btn-sm px-2 py-0" style="font-size:0.75rem" onclick="showDetails(${e.attempt_id}, '${_esc(e.student_name || e.student_email)}')">
            <i class="bi bi-info-circle me-1"></i>Details
          </button>` : '—'}
        </td>
      </tr>`;
        }).join("");

        // Initialize Bootstrap tooltips
        const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');
        [...tooltipTriggerList].map(el => new bootstrap.Tooltip(el));

      } catch (err) {
        tbody.innerHTML = `
      <tr>
        <td colspan="6" class="text-center text-danger py-3">
          ${_esc(err.detail || "Failed to load report.")}
        </td>
      </tr>`;
      }
    }

    async function showDetails(attemptId, studentName) {
      document.getElementById("detailStudentName").textContent = studentName;
      document.getElementById("timelineContainer").innerHTML = `
        <div class="text-center py-4">
          <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
          <div class="small text-muted mt-2">Loading timeline...</div>
        </div>`;
      document.getElementById("snapshotContainer").innerHTML = `
        <div class="text-center py-4 w-100">
          <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
          <div class="small text-muted mt-2">Loading snapshots...</div>
        </div>`;

      const modal = new bootstrap.Modal(document.getElementById('detailModal'));
      modal.show();

      try {
        // Fetch Violations
        const vData = await window.apiFetch(`/api/teacher/attempts/${attemptId}/violations`);
        if (vData && vData.items) {
          if (vData.items.length === 0) {
            document.getElementById("timelineContainer").innerHTML = '<div class="text-muted small">No violations recorded.</div>';
          } else {
            document.getElementById("timelineContainer").innerHTML = vData.items.map(v => {
              // Map 'type' or 'violation_type' safely
              const type = v.type || v.violation_type;
              const typeLabel = type ? type.replace(/_/g, ' ') : "Violation";
              const isSerious = ['camera_unavailable', 'fullscreen_exit'].includes(type);
              
              return `
                        <div class="mb-3 ps-3 border-start border-3 ${isSerious ? 'border-danger' : 'border-warning'}">
                            <div class="fw-bold small text-uppercase text-muted" style="font-size:0.65rem">${typeLabel}</div>
                            <div class="small fw-medium">${_esc(v.details || "No payload details")}</div>
                            <div class="text-muted" style="font-size:0.65rem">${new Date(v.occurred_at).toLocaleString()}</div>
                        </div>
                    `;
            }).join("");
          }
        }

        // Fetch Snapshots
        const sData = await window.apiFetch(`/api/teacher/attempts/${attemptId}/snapshots`);
        if (sData && sData.items) {
          if (sData.items.length === 0) {
            document.getElementById("snapshotContainer").innerHTML = '<div class="text-muted small w-100">No snapshots available.</div>';
          } else {
            document.getElementById("snapshotContainer").innerHTML = sData.items.map(s => `
                        <div class="text-center">
                            <img src="${s.url}" class="rounded border mb-1" 
                                 style="width:180px; height:135px; object-fit:cover; cursor:pointer;" 
                                 onclick="window.open('${s.url}')" 
                                 title="Captured at ${new Date(s.captured_at).toLocaleString()}"/>
                            <div class="text-muted" style="font-size:0.6rem">${new Date(s.captured_at).toLocaleTimeString()}</div>
                        </div>
                    `).join("");
          }
        }
      } catch (err) {
        console.error(err);
        document.getElementById("timelineContainer").innerHTML = '<div class="text-danger small">Error loading details.</div>';
      }
    }

    // ── Utilities ─────────────────────────────────────────────────────

    function _formatViolations(summary) {
      if (!summary || Object.keys(summary).length === 0) return "";
      return Object.entries(summary)
        .map(([type, count]) => {
          const label = type.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
          return `${label}: ${count}`;
        })
        .join(", ");
    }

    function _statusBadge(status) {
      const map = {
        submitted: "bg-success-subtle text-success",
        auto_submitted: "bg-warning-subtle text-warning",
        in_progress: "bg-info-subtle text-info",
        not_attempted: "bg-secondary-subtle text-secondary",
      };
      return map[status] || "bg-secondary-subtle text-secondary";
    }

    function _esc(s) {
      return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>

</html>
