<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Proctor Reports — EMS</title>
  <script src="/static/js/theme.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/static/css/custom.css" />
</head>

<body>
  <div id="sidebar-mount"></div>
  <div id="page-content" class="page-content">
    <div id="notification-bar" class="notification-bar"></div>

    <div class="d-flex align-items-center gap-3 mb-3">
      <h1 class="page-title mb-0" id="pageTitle">Proctor Reports</h1>
    </div>

    <div id="pageAlert" class="alert d-none mb-3" role="alert"></div>

    <!-- Exam picker -->
    <div class="content-card mb-3" id="examPickerCard">
      <label class="form-label fw-medium small">Select Exam</label>
      <div class="d-flex gap-2">
        <select class="form-select form-select-sm" id="examPicker" style="max-width:400px">
          <option value="">Loading exams...</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="loadFromPicker()">
          View Report
        </button>
      </div>
    </div>

    <!-- Proctor report content (hidden until exam selected) -->
    <div id="reportContent" class="d-none">

      <div class="content-card">
        <div class="d-flex justify-content-between
                  align-items-center mb-3">
          <span class="small fw-semibold">Student Violations</span>
        </div>

        <div class="table-responsive-wrapper">
          <table class="table table-hover table-sm align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>#</th>
                <th>Email</th>
                <th>Name</th>
                <th>Status</th>
                <th>Violations</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="reportTableBody">
              <tr>
                <td colspan="6" class="text-center text-muted py-4">
                  Loading...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div><!-- /#reportContent -->
  </div><!-- /#page-content -->

  <!-- Violation Detail Modal -->
  <div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Proctoring Details: <span id="detailStudentName"></span></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-0">
          <div class="row g-0">
            <!-- Timeline -->
            <div class="col-md-5 border-end">
              <div class="p-3 fw-bold border-bottom sticky-top" style="background-color: var(--bs-modal-bg, #212529);">Violation Timeline</div>
              <div id="timelineContainer" class="p-3"></div>
            </div>
            <!-- Snapshot Gallery -->
            <div class="col-md-7">
              <div class="p-3 fw-bold border-bottom sticky-top" style="background-color: var(--bs-modal-bg, #212529);">Camera Snapshots</div>
              <div id="snapshotContainer" class="p-3 d-flex flex-wrap gap-2"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/sidebar.js"></script>
  <script src="/static/js/notifications.js"></script>

  <script src="/static/js/utils.js"></script>
  <script src="/static/js/teacher/proctor_report.js"></script>

</body>

</html>
