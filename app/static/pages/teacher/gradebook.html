<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Grade Book — EMS</title>
  <script src="/static/js/theme.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/static/css/custom.css" />
</head>

<body>
  <div id="sidebar-mount"></div>
  <div id="page-content" class="page-content">
    <div id="notification-bar" class="notification-bar"></div>

    <div class="d-flex align-items-center gap-3 mb-3">
      <a href="/static/pages/teacher/courses.html" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>My Courses
      </a>
      <h1 class="page-title mb-0" id="pageTitle">Grade Book</h1>
    </div>

    <div id="pageAlert" class="alert d-none mb-3" role="alert"></div>

    <!-- Exam picker (shown when no exam_id in URL) -->
    <div class="content-card mb-3" id="examPickerCard">
      <label class="form-label fw-medium small">Select Exam</label>
      <div class="d-flex gap-2">
        <select class="form-select form-select-sm" id="examPicker" style="max-width:400px">
          <option value="">Loading exams...</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="loadFromPicker()">
          View
        </button>
      </div>
    </div>

    <!-- Grade book content (hidden until exam selected) -->
    <div id="gradeBookContent" class="d-none">

      <!-- Exam info + action bar -->
      <div class="content-card mb-3" id="examInfoCard">
        <div class="d-flex justify-content-center py-2">
          <div class="spinner-border spinner-border-sm" role="status"></div>
        </div>
      </div>

      <!-- Summary stat cards -->
      <div class="row g-3 mb-3" id="statCards"></div>

      <!-- Grade book table -->
      <div class="content-card">
        <div class="d-flex justify-content-between
                  align-items-center mb-3 flex-wrap gap-2">
          <span class="small fw-semibold">All Students</span>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-success btn-sm" onclick="exportCsv()">
              <i class="bi bi-filetype-csv me-1"></i>CSV
            </button>
            <button class="btn btn-outline-danger btn-sm" onclick="exportPdf()">
              <i class="bi bi-filetype-pdf me-1"></i>PDF
            </button>
            <a id="gradeLink" href="#" class="btn btn-outline-primary btn-sm">
              <i class="bi bi-pencil-square me-1"></i>Grade
            </a>
          </div>
        </div>

        <div class="table-responsive-wrapper">
          <table class="table table-hover table-sm align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>#</th>
                <th>Email</th>
                <th>Name</th>
                <th>Status</th>
                <th>MCQ</th>
                <th>Subj.</th>
                <th>Neg.</th>
                <th>Total</th>
                <th>Avail.</th>
                <th>%</th>
                <th>P/F</th>
              </tr>
            </thead>
            <tbody id="gradeTableBody">
              <tr>
                <td colspan="11" class="text-center text-muted py-4">
                  Loading...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div><!-- /#gradeBookContent -->
  </div><!-- /#page-content -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/sidebar.js"></script>
  <script src="/static/js/notifications.js"></script>

  <script>
    const urlP = new URLSearchParams(window.location.search);
    let examId = parseInt(urlP.get("exam_id")) || null;

    (function () {
      const prev = window.__onAuthReady;
      window.__onAuthReady = async function (user) {
        if (typeof prev === "function") await prev(user);
        await loadExamPicker();
        if (examId) {
          document.getElementById("examPicker").value = examId;
          await loadGradeBook(examId);
        }
      };
    })();

    // ── Exam picker ───────────────────────────────────────────────────

    async function loadExamPicker() {
      try {
        const data = await window.apiFetch(
          "/api/teacher/exams?page_size=100"
        );
        if (!data) return;

        const picker = document.getElementById("examPicker");
        picker.innerHTML = `<option value="">— Select an exam —</option>`
          + data.items.map(e =>
            `<option value="${e.id}"
             ${e.id === examId ? 'selected' : ''}>
             ${_esc(e.course_code)} — ${_esc(e.title)}
             ${e.results_published ? '✓' : ''}
           </option>`
          ).join("");
      } catch (_) { }
    }

    function loadFromPicker() {
      const val = document.getElementById("examPicker").value;
      if (!val) return;
      examId = parseInt(val);
      // Update URL without reload
      history.replaceState(null, "",
        `?exam_id=${examId}`);
      loadGradeBook(examId);
    }

    // ── Load grade book ───────────────────────────────────────────────

    async function loadGradeBook(eid) {
      document.getElementById("gradeBookContent")
        .classList.remove("d-none");
      document.getElementById("gradeLink").href =
        `/static/pages/teacher/grading.html?exam_id=${eid}`;

      await loadExamInfo(eid);
      await loadTable(eid);
    }

    async function loadExamInfo(eid) {
      const card = document.getElementById("examInfoCard");
      try {
        const gb = await window.apiFetch(
          `/api/teacher/exams/${eid}/gradebook`
        );
        if (!gb) return;

        document.getElementById("pageTitle").textContent =
          `Grade Book — ${gb.exam_title}`;
        document.title = `Grade Book: ${gb.exam_title} — EMS`;

        card.innerHTML = `
      <div class="d-flex justify-content-between
                  align-items-center flex-wrap gap-3">
        <div>
          <h6 class="fw-semibold mb-1">${_esc(gb.exam_title)}</h6>
          <div class="small text-muted">
            Course: <strong>${_esc(gb.course_code)}</strong>
            · Total: <strong>${gb.total_marks}</strong>
            · Passing: <strong>${gb.passing_marks}</strong>
          </div>
        </div>
        <div class="d-flex align-items-center gap-2">
          ${!gb.is_published
            ? `<a href="/static/pages/teacher/exam_questions.html?exam_id=${eid}" 
                  class="btn btn-outline-primary btn-sm">
                 <i class="bi bi-question-circle me-1"></i>Questions
               </a>
               <a href="/static/pages/teacher/exam_create.html?exam_id=${eid}" 
                  class="btn btn-outline-secondary btn-sm">
                 <i class="bi bi-gear-fill me-1"></i>Settings
               </a>`
            : ""}
          <span class="badge ${gb.results_published
            ? 'bg-success' : 'bg-warning text-dark'}">
            ${gb.results_published
            ? '✓ Results Published'
            : 'Results Not Published'}
          </span>
          ${!gb.results_published && gb.is_published
            ? `<button class="btn btn-success btn-sm"
                       id="publishResultsBtn"
                       onclick="publishResults(${eid})">
                 <i class="bi bi-send-check me-1"></i>
                 Publish Results
               </button>`
            : ""}
        </div>
      </div>`;

        // Stat cards
        document.getElementById("statCards").innerHTML = `
      ${_statCard("bi-people-fill text-primary",
          gb.attempted_count, "Attempted", "bg-primary-subtle")}
      ${_statCard("bi-person-dash text-secondary",
            gb.not_attempted_count, "Not Attempted",
            "bg-secondary-subtle")}
      ${_statCard("bi-check-circle-fill text-success",
              gb.pass_count, "Passed", "bg-success-subtle")}
      ${_statCard("bi-x-circle-fill text-danger",
                gb.fail_count, "Failed", "bg-danger-subtle")}`;

      } catch (err) {
        card.innerHTML = `
      <div class="text-danger small">
        ${_esc(err.detail || "Failed to load exam info.")}
      </div>`;
      }
    }

    function _statCard(iconCls, value, label, bgCls) {
      return `
    <div class="col-6 col-md-3">
      <div class="content-card ${bgCls} text-center py-3">
        <i class="bi ${iconCls} fs-4 d-block mb-1"></i>
        <div class="fw-bold fs-5">${value}</div>
        <div class="small text-muted">${label}</div>
      </div>
    </div>`;
    }

    async function loadTable(eid) {
      const tbody = document.getElementById("gradeTableBody");
      try {
        const gb = await window.apiFetch(
          `/api/teacher/exams/${eid}/gradebook`
        );
        if (!gb) return;

        if (!gb.entries.length) {
          tbody.innerHTML = `
        <tr>
          <td colspan="11"
              class="text-center text-muted py-4">
            No enrolled students.
          </td>
        </tr>`;
          return;
        }

        tbody.innerHTML = gb.entries.map((e, i) => `
      <tr>
        <td class="text-muted small">${i + 1}</td>
        <td class="small font-monospace">${_esc(e.student_email)}</td>
        <td class="small">${_esc(e.student_name) || "—"}</td>
        <td>
          <span class="badge ${_statusBadge(e.status)} small">
            ${e.status.replace(/_/g, " ")}
          </span>
        </td>
        <td class="small text-center">${e.mcq_marks_awarded}</td>
        <td class="small text-center">
          ${e.subjective_marks_awarded}
        </td>
        <td class="small text-center text-danger">
          ${e.negative_marks_deducted > 0
            ? '-' + e.negative_marks_deducted : '—'}
        </td>
        <td class="small text-center fw-semibold">
          ${e.total_marks_awarded}
        </td>
        <td class="small text-center text-muted">
          ${e.total_marks_available}
        </td>
        <td class="small text-center">${e.percentage}%</td>
        <td>
          <span class="badge small ${e.is_pass === true
            ? 'bg-success'
            : e.is_pass === false
              ? 'bg-danger'
              : 'bg-secondary'}">
            ${e.is_pass === true ? 'PASS'
            : e.is_pass === false ? 'FAIL' : '—'}
          </span>
        </td>
      </tr>`).join("");

      } catch (err) {
        tbody.innerHTML = `
      <tr>
        <td colspan="11" class="text-center text-danger py-3">
          ${_esc(err.detail || "Failed to load grade book.")}
        </td>
      </tr>`;
      }
    }

    // ── Publish results ───────────────────────────────────────────────

    async function publishResults(eid) {
      if (!confirm(
        "Publish results? Students will be notified and "
        + "will see their scores immediately."
      )) return;

      const btn = document.getElementById("publishResultsBtn");
      if (btn) { btn.disabled = true; btn.textContent = "Publishing..."; }

      try {
        const data = await window.apiFetch(
          `/api/teacher/exams/${eid}/publish-results`,
          { method: "POST" }
        );
        _showPageAlert(
          `${data.message} ${data.notified_students} student(s) notified.`,
          "success"
        );
        await loadExamInfo(eid);
        await loadTable(eid);
      } catch (err) {
        _showPageAlert(
          err.detail || "Failed to publish results.", "danger"
        );
        if (btn) { btn.disabled = false; btn.textContent = "Publish Results"; }
      }
    }

    // ── Exports ───────────────────────────────────────────────────────

    async function exportCsv() {
      if (!examId) return;
      try {
        const res = await window.apiFetch(
          `/api/teacher/exams/${examId}/gradebook/export/csv`
        );
        if (!res) return;
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `gradebook_${examId}.csv`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      } catch (err) {
        alert(err.detail || "CSV export failed.");
      }
    }

    async function exportPdf() {
      if (!examId) return;
      try {
        const res = await window.apiFetch(
          `/api/teacher/exams/${examId}/gradebook/export/pdf`
        );
        if (!res) return;
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `gradebook_${examId}.pdf`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      } catch (err) {
        alert(err.detail || "PDF export failed.");
      }
    }

    // ── Utilities ─────────────────────────────────────────────────────

    function _statusBadge(status) {
      const map = {
        submitted: "bg-success-subtle text-success",
        auto_submitted: "bg-warning-subtle text-warning",
        in_progress: "bg-info-subtle text-info",
        not_attempted: "bg-secondary-subtle text-secondary",
      };
      return map[status] || "bg-secondary-subtle text-secondary";
    }

    function _showPageAlert(msg, type) {
      const el = document.getElementById("pageAlert");
      el.className = `alert alert-${type}`;
      el.textContent = msg;
      el.classList.remove("d-none");
    }

    function _esc(s) {
      return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>

</html>
