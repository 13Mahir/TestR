<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Grade Book — EMS</title>
  <script src="/static/js/theme.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/static/css/custom.css" />
</head>

<body>
  <div id="sidebar-mount"></div>
  <div id="page-content" class="page-content">
    <div id="notification-bar" class="notification-bar"></div>

    <div class="d-flex align-items-center gap-3 mb-3">
      <a href="/static/pages/teacher/courses.html" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>My Courses
      </a>
      <h1 class="page-title mb-0" id="pageTitle">Grade Book</h1>
    </div>

    <div id="pageAlert" class="alert d-none mb-3" role="alert"></div>

    <!-- Exam picker (shown when no exam_id in URL) -->
    <div class="content-card mb-3" id="examPickerCard">
      <label class="form-label fw-medium small">Select Exam</label>
      <div class="d-flex gap-2">
        <select class="form-select form-select-sm" id="examPicker" style="max-width:400px">
          <option value="">Loading exams...</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="loadFromPicker()">
          View
        </button>
      </div>
    </div>

    <!-- Grade book content (hidden until exam selected) -->
    <div id="gradeBookContent" class="d-none">

      <!-- Exam info + action bar -->
      <div class="content-card mb-3" id="examInfoCard">
        <div class="d-flex justify-content-center py-2">
          <div class="spinner-border spinner-border-sm" role="status"></div>
        </div>
      </div>

      <!-- Summary stat cards -->
      <div class="row g-3 mb-3" id="statCards"></div>

      <!-- Grade book table -->
      <div class="content-card">
        <div class="d-flex justify-content-between
                  align-items-center mb-3 flex-wrap gap-2">
          <span class="small fw-semibold">All Students</span>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-success btn-sm" onclick="exportCsv()">
              <i class="bi bi-filetype-csv me-1"></i>CSV
            </button>
            <button class="btn btn-outline-danger btn-sm" onclick="exportPdf()">
              <i class="bi bi-filetype-pdf me-1"></i>PDF
            </button>
            <a id="gradeLink" href="#" class="btn btn-outline-primary btn-sm">
              <i class="bi bi-pencil-square me-1"></i>Grade
            </a>
          </div>
        </div>

        <div class="table-responsive-wrapper">
          <table class="table table-hover table-sm align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>#</th>
                <th>Email</th>
                <th>Name</th>
                <th>Status</th>
                <th>MCQ</th>
                <th>Subj.</th>
                <th>Neg.</th>
                <th>Total</th>
                <th>Avail.</th>
                <th>%</th>
                <th>P/F</th>
              </tr>
            </thead>
            <tbody id="gradeTableBody">
              <tr>
                <td colspan="11" class="text-center text-muted py-4">
                  Loading...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div><!-- /#gradeBookContent -->
  </div><!-- /#page-content -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/sidebar.js"></script>
  <script src="/static/js/notifications.js"></script>

  <script src="/static/js/utils.js"></script>
  <script src="/static/js/teacher/gradebook.js"></script>

</body>

</html>
