<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <script src="/static/js/theme.js"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password - TestR</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/static/css/custom.css" />
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bs-tertiary-bg);
        }

        .cp-card {
            width: 100%;
            max-width: 440px;
            border-radius: 1rem;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }
    </style>
</head>

<body>

    <div class="card cp-card border-0 p-4 p-md-5">

        <div class="text-center mb-4">
            <div class="display-6 mb-2">🔒</div>
            <h1 class="h5 fw-semibold mb-1">Change your password</h1>
            <p class="text-muted small mb-0" id="reasonText">
                Please set a new password to continue.
            </p>
        </div>

        <!-- Alert area -->
        <div id="cpAlert" class="alert d-none align-items-center gap-2" role="alert">
            <i class="bi flex-shrink-0" id="cpAlertIcon"></i>
            <span id="cpAlertMsg"></span>
        </div>

        <form id="cpForm" novalidate>

            <div class="mb-3">
                <label for="currentPass" class="form-label fw-medium">
                    Current password
                </label>
                <input type="password" class="form-control" id="currentPass" placeholder="••••••••" required />
                <div class="invalid-feedback">Required.</div>
            </div>

            <div class="mb-3">
                <label for="newPass" class="form-label fw-medium">
                    New password
                </label>
                <input type="password" class="form-control" id="newPass" placeholder="••••••••" minlength="8"
                    required />
                <div class="form-text small opacity-75 mt-2">
                    Must be 8+ characters, with an uppercase letter, a lowercase letter, and a digit.
                </div>
                <div class="invalid-feedback" id="newPassFeedback">
                    Password must be at least 8 characters.
                </div>
            </div>

            <div class="mb-4">
                <label for="confirmPass" class="form-label fw-medium">
                    Confirm new password
                </label>
                <input type="password" class="form-control" id="confirmPass" placeholder="••••••••" required />
                <div class="invalid-feedback">Passwords do not match.</div>
            </div>

            <button type="submit" class="btn btn-primary w-100" style="height:2.75rem;font-weight:500;" id="cpBtn">
                <span id="cpBtnText">Update password</span>
                <span id="cpSpinner" class="spinner-border spinner-border-sm d-none ms-2" role="status"></span>
            </button>

        </form>

        <div class="text-center mt-3">
            <button class="btn btn-link btn-sm text-muted p-0" id="logoutBtn">
                Sign out instead
            </button>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>

    <!--
    auth.js is loaded here so window.apiFetch and window.logout
    are available. The auth guard in auth.js explicitly allows
    this page even when force_password_reset is true.
  -->
    <script src="/static/js/auth.js"></script>

    <script src="/static/js/change-password.js"></script>
</body>

</html>
