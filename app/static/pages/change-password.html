<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <script>
        /* Prevent flash of wrong theme on load */
        (function () {
            var t = localStorage.getItem("ems-theme") || "light";
            document.documentElement.setAttribute("data-bs-theme", t);
        })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password - TestR</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/static/css/custom.css" />
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bs-tertiary-bg);
        }

        .cp-card {
            width: 100%;
            max-width: 440px;
            border-radius: 1rem;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }
    </style>
</head>

<body>

    <div class="card cp-card border-0 p-4 p-md-5">

        <div class="text-center mb-4">
            <div class="display-6 mb-2">🔒</div>
            <h1 class="h5 fw-semibold mb-1">Change your password</h1>
            <p class="text-muted small mb-0" id="reasonText">
                Please set a new password to continue.
            </p>
        </div>

        <!-- Alert area -->
        <div id="cpAlert" class="alert d-none align-items-center gap-2" role="alert">
            <i class="bi flex-shrink-0" id="cpAlertIcon"></i>
            <span id="cpAlertMsg"></span>
        </div>

        <form id="cpForm" novalidate>

            <div class="mb-3">
                <label for="currentPass" class="form-label fw-medium">
                    Current password
                </label>
                <input type="password" class="form-control" id="currentPass" placeholder="••••••••" required />
                <div class="invalid-feedback">Required.</div>
            </div>

            <div class="mb-3">
                <label for="newPass" class="form-label fw-medium">
                    New password
                </label>
                <input type="password" class="form-control" id="newPass" placeholder="Min. 8 characters" minlength="8"
                    required />
                <div class="invalid-feedback">
                    Password must be at least 8 characters.
                </div>
            </div>

            <div class="mb-4">
                <label for="confirmPass" class="form-label fw-medium">
                    Confirm new password
                </label>
                <input type="password" class="form-control" id="confirmPass" placeholder="••••••••" required />
                <div class="invalid-feedback">Passwords do not match.</div>
            </div>

            <button type="submit" class="btn btn-primary w-100" style="height:2.75rem;font-weight:500;" id="cpBtn">
                <span id="cpBtnText">Update password</span>
                <span id="cpSpinner" class="spinner-border spinner-border-sm d-none ms-2" role="status"></span>
            </button>

        </form>

        <div class="text-center mt-3">
            <button class="btn btn-link btn-sm text-muted p-0" onclick="logout()">
                Sign out instead
            </button>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>

    <!--
    auth.js is loaded here so window.apiFetch and window.logout
    are available. The auth guard in auth.js explicitly allows
    this page even when force_password_reset is true.
  -->
    <script src="/static/js/auth.js"></script>

    <script>
        /**
         * change-password.html inline script
         * Handles form submission and success redirect.
         */

        // Show why reset is required if force_password_reset is set
        window.__onAuthReady = function (user) {
            if (user.force_password_reset) {
                document.getElementById("reasonText").textContent =
                    "An administrator requires you to change your password before continuing.";
            }
        };

        const form = document.getElementById("cpForm");
        const currentPass = document.getElementById("currentPass");
        const newPass = document.getElementById("newPass");
        const confirmPass = document.getElementById("confirmPass");
        const cpBtn = document.getElementById("cpBtn");
        const cpBtnText = document.getElementById("cpBtnText");
        const cpSpinner = document.getElementById("cpSpinner");
        const alertBox = document.getElementById("cpAlert");
        const alertMsg = document.getElementById("cpAlertMsg");
        const alertIcon = document.getElementById("cpAlertIcon");

        function showAlert(msg, type = "danger") {
            alertBox.className = `alert alert-${type} d-flex align-items-center gap-2`;
            alertIcon.className = type === "success"
                ? "bi bi-check-circle-fill flex-shrink-0"
                : "bi bi-exclamation-triangle-fill flex-shrink-0";
            alertMsg.textContent = msg;
        }

        function setLoading(on) {
            cpBtn.disabled = on;
            cpBtnText.textContent = on ? "Updating..." : "Update password";
            cpSpinner.classList.toggle("d-none", !on);
        }

        form.addEventListener("submit", async function (e) {
            e.preventDefault();

            // Client-side confirm match
            if (newPass.value !== confirmPass.value) {
                confirmPass.setCustomValidity("Passwords do not match.");
                form.classList.add("was-validated");
                return;
            }
            confirmPass.setCustomValidity("");

            if (!form.checkValidity()) {
                form.classList.add("was-validated");
                return;
            }

            setLoading(true);

            try {
                await window.apiFetch("/api/auth/change-password", {
                    method: "POST",
                    body: JSON.stringify({
                        current_password: currentPass.value,
                        new_password: newPass.value,
                    }),
                });

                showAlert("Password updated successfully. Redirecting...", "success");

                // Re-fetch user to get updated role for redirect
                setTimeout(async () => {
                    const user = await window.apiFetch("/api/auth/me");
                    if (user) {
                        const destinations = {
                            admin: "/static/pages/admin/overview.html",
                            teacher: "/static/pages/teacher/courses.html",
                            student: "/static/pages/student/dashboard.html",
                        };
                        window.location.href =
                            destinations[user.role] || "/static/pages/login.html";
                    }
                }, 1200);

            } catch (err) {
                showAlert(err.detail || "Failed to update password. Try again.");
            } finally {
                setLoading(false);
            }
        });

        // Apply saved theme
        const savedTheme = localStorage.getItem("ems-theme") || "light";
        document.documentElement.setAttribute("data-bs-theme", savedTheme);
    </script>
</body>

</html>
