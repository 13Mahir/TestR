<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — EMS</title>
    <script src="/static/js/theme.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/static/css/custom.css" />
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bs-tertiary-bg);
        }

        .rp-card {
            width: 100%;
            max-width: 440px;
            border-radius: 1rem;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }
    </style>
</head>

<body>
    <div class="card rp-card border-0 p-4 p-md-5">

        <div class="text-center mb-4">
            <div class="display-6 mb-2">🔑</div>
            <h1 class="h5 fw-semibold mb-1">Reset your password</h1>
            <p class="text-muted small mb-0">
                Enter your new password below.
            </p>
        </div>

        <!-- Token missing state -->
        <div id="noTokenState" class="d-none text-center py-3">
            <i class="bi bi-exclamation-triangle text-warning fs-3 d-block mb-2"></i>
            <p class="text-muted small">
                No reset token found in the URL.<br />
                Contact your administrator for a new reset link.
            </p>
            <a href="/static/pages/login.html" class="btn btn-primary btn-sm mt-2">
                Go to Login
            </a>
        </div>

        <!-- Reset form -->
        <div id="resetFormArea">
            <div id="rpAlert" class="alert d-none" role="alert"></div>

            <form id="rpForm" novalidate>
                <div class="mb-3">
                    <label for="rpNewPass" class="form-label fw-medium">
                        New password
                    </label>
                    <input type="password" class="form-control" id="rpNewPass" placeholder="Min. 8 characters"
                        minlength="8" required />
                    <div class="invalid-feedback">
                        Password must be at least 8 characters.
                    </div>
                </div>

                <div class="mb-4">
                    <label for="rpConfirmPass" class="form-label fw-medium">
                        Confirm new password
                    </label>
                    <input type="password" class="form-control" id="rpConfirmPass" placeholder="••••••••" required />
                    <div class="invalid-feedback">Passwords do not match.</div>
                </div>

                <button type="submit" class="btn btn-primary w-100" style="height:2.75rem;font-weight:500;" id="rpBtn">
                    <span id="rpBtnText">Reset password</span>
                    <span id="rpSpinner" class="spinner-border spinner-border-sm d-none ms-2" role="status"></span>
                </button>
            </form>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Extract token from URL: /reset-password.html?token=<TOKEN>
        const params = new URLSearchParams(window.location.search);
        const resetToken = params.get("token");

        if (!resetToken) {
            document.getElementById("noTokenState").classList.remove("d-none");
            document.getElementById("resetFormArea").classList.add("d-none");
        }

        const form = document.getElementById("rpForm");
        const newPass = document.getElementById("rpNewPass");
        const confirmPass = document.getElementById("rpConfirmPass");
        const rpBtn = document.getElementById("rpBtn");
        const rpBtnText = document.getElementById("rpBtnText");
        const rpSpinner = document.getElementById("rpSpinner");
        const alertBox = document.getElementById("rpAlert");

        function showAlert(msg, type = "danger") {
            alertBox.className = `alert alert-${type}`;
            alertBox.textContent = msg;
            alertBox.classList.remove("d-none");
        }

        function setLoading(on) {
            rpBtn.disabled = on;
            rpBtnText.textContent = on ? "Resetting..." : "Reset password";
            rpSpinner.classList.toggle("d-none", !on);
        }

        form.addEventListener("submit", async function (e) {
            e.preventDefault();

            if (newPass.value !== confirmPass.value) {
                confirmPass.setCustomValidity("Passwords do not match.");
                form.classList.add("was-validated");
                return;
            }
            confirmPass.setCustomValidity("");

            if (!form.checkValidity()) {
                form.classList.add("was-validated");
                return;
            }

            setLoading(true);

            try {
                const url = `/api/admin/users/consume-reset-token?` +
                    `token=${encodeURIComponent(resetToken)}&` +
                    `new_password=${encodeURIComponent(newPass.value)}`;

                const res = await fetch(url, { method: "POST" });
                const data = await res.json();

                if (!res.ok) {
                    showAlert(data.detail || "Reset failed. Please try again.");
                    return;
                }

                showAlert(
                    "Password reset successfully. Redirecting to login...",
                    "success"
                );

                setTimeout(() => {
                    window.location.href = "/static/pages/login.html";
                }, 1500);

            } catch (err) {
                showAlert("Network error. Please check your connection.");
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>

</html>
