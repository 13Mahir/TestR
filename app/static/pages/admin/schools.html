<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Schools — TestR</title>
  <script src="/static/js/theme.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/static/css/custom.css" />
  <style>
    .school-card {
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .school-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
    }

    .branch-tag {
      display: inline-flex;
      align-items: center;
      padding: 0.4rem 0.8rem;
      background: var(--bs-tertiary-bg);
      border: 1px solid var(--bs-border-color);
      border-radius: 2rem;
      font-size: 0.85rem;
      margin-right: 0.5rem;
      margin-bottom: 0.5rem;
    }
  </style>
</head>

<body>
  <div id="sidebar-mount"></div>
  <div id="page-content" class="page-content">
    <div id="notification-bar" class="notification-bar"></div>

    <div class="page-header">
      <h1 class="page-title">Schools & Branches</h1>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-secondary btn-sm" onclick="loadSchools()">
          <i class="bi bi-arrow-clockwise"></i> Refresh
        </button>
      </div>
    </div>

    <div class="alert alert-info d-flex gap-2 mb-4" role="alert">
      <i class="bi bi-info-circle-fill flex-shrink-0 mt-1"></i>
      <div class="small">
        This view displays all educational schools and their associated academic branches.
        Each student email format <code>{YY}{BRANCH}{RLL}@{sch}.clg.ac.in</code> is validated against these
        mappings.
      </div>
    </div>

    <div id="schoolsContainer" class="row g-4">
      <!-- Shimmer/Loading -->
      <div class="col-12 text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <div class="mt-2 text-muted">Loading academic structure...</div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/sidebar.js"></script>
  <script src="/static/js/notifications.js"></script>

  <script>
    (function () {
      var _prev = window.__onAuthReady;
      window.__onAuthReady = async function (user) {
        if (typeof _prev === "function") await _prev(user);
        await loadSchools();
      };
    })();

    async function loadSchools() {
      const container = document.getElementById("schoolsContainer");
      try {
        const schools = await window.apiFetch("/api/admin/schools");
        if (!schools) return;

        if (schools.length === 0) {
          container.innerHTML = `
            <div class="col-12 text-center py-5">
              <i class="bi bi-folder-x display-1 text-muted"></i>
              <p class="mt-3 text-muted">No schools found in the database.</p>
            </div>`;
          return;
        }

        container.innerHTML = schools.map(s => `
          <div class="col-12 col-lg-6">
            <div class="content-card school-card h-100">
              <div class="d-flex justify-content-between align-items-start mb-3">
                <div>
                  <div class="badge bg-primary-subtle text-primary mb-2">Code: ${s.code}</div>
                  <h4 class="fw-bold mb-1">${s.name}</h4>
                  <div class="small text-muted">${s.branches.length} Academic Branches</div>
                </div>
                <div class="logo-circle bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center" style="width:48px; height:48px;">
                   <i class="bi bi-building fs-4"></i>
                </div>
              </div>
              <hr class="text-muted opacity-25" />
              <div class="mt-3">
                <h6 class="text-uppercase small fw-bold text-muted mb-3">Associated Branches</h6>
                <div class="d-flex flex-wrap">
                  ${s.branches.length > 0
            ? s.branches.map(b => `
                        <div class="branch-tag" title="${b.name}">
                          <span class="fw-bold text-primary me-2">${b.code}</span>
                          <span class="text-truncate" style="max-width: 200px;">${b.name}</span>
                        </div>
                      `).join('')
            : '<div class="text-muted small italic">No branches defined for this school.</div>'
          }
                </div>
              </div>
            </div>
          </div>
        `).join('');

      } catch (err) {
        container.innerHTML = `
          <div class="col-12">
            <div class="alert alert-danger">
              <i class="bi bi-exclamation-triangle me-2"></i>
              Failed to load schools: ${err.detail || err.message}
            </div>
          </div>`;
      }
    }
  </script>
</body>

</html>
