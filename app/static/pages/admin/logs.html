<!DOCTYPE html>
<html lang="en">
<!-- theme.js in <head> prevents flash of wrong theme -->

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Logs — EMS</title>
  <!-- theme.js FIRST — before Bootstrap CSS to prevent theme flash -->
  <script src="/static/js/theme.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/static/css/custom.css" />
</head>

<body>

  <!-- Sidebar injected here by sidebar.js -->
  <div id="sidebar-mount"></div>

  <!-- All page-specific content goes inside this div -->
  <div id="page-content" class="page-content">

    <!-- Notification bell row (injected by notifications.js) -->
    <div id="notification-bar" class="notification-bar"></div>

    <!-- Page header -->
    <div class="page-header">
      <h1 class="page-title">System Logs</h1>
    </div>

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-0" id="logsTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="systemLogsTab" data-bs-toggle="tab" data-bs-target="#systemLogsPane"
          type="button" role="tab">
          <i class="bi bi-journal-text me-1"></i>
          System Logs
          <span class="badge bg-secondary ms-1" id="systemLogsBadge">&mdash;</span>
        </button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="auditLogTab" data-bs-toggle="tab" data-bs-target="#auditLogPane" type="button"
          role="tab" onclick="if(!_auditLoaded){loadAuditLogs(1);}">
          <i class="bi bi-shield-lock-fill me-1"></i>
          Audit Log
          <span class="badge bg-secondary ms-1" id="auditLogBadge">&mdash;</span>
        </button>
      </li>
    </ul>

    <div class="tab-content">

      <!-- ═══════════════════════════════════
           TAB A: System Logs
      ════════════════════════════════════ -->
      <div class="tab-pane fade show active" id="systemLogsPane" role="tabpanel">
        <div class="content-card" style="border-top-left-radius:0;border-top-right-radius:0;">

          <!-- Filter bar -->
          <div class="row g-2 align-items-end mb-3">
            <div class="col-12 col-sm-6 col-md-4">
              <label class="form-label small fw-medium mb-1">Event Type</label>
              <select class="form-select form-select-sm" id="slEventType">
                <option value="">All events</option>
                <option value="exam_created">Exam Created</option>
                <option value="exam_published">Exam Published</option>
                <option value="results_published">Results Published</option>
                <option value="users_created">Users Created</option>
                <option value="course_created">Course Created</option>
                <option value="course_activated">Course Activated</option>
                <option value="course_deactivated">Course Deactivated</option>
              </select>
            </div>
            <div class="col-auto">
              <button class="btn btn-primary btn-sm" onclick="loadSystemLogs(1)">
                <i class="bi bi-funnel me-1"></i>Filter
              </button>
            </div>
            <div class="col-auto ms-auto">
              <button class="btn btn-outline-secondary btn-sm" onclick="loadSystemLogs(systemLogsPage)" title="Refresh">
                <i class="bi bi-arrow-clockwise"></i>
              </button>
            </div>
          </div>

          <!-- System logs table -->
          <div class="table-responsive-wrapper">
            <table class="table table-hover table-sm align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th style="width:40px">#</th>
                  <th style="width:160px">Event Type</th>
                  <th>Description</th>
                  <th style="width:80px">Actor ID</th>
                  <th style="width:200px">Metadata</th>
                  <th style="width:140px">Timestamp</th>
                </tr>
              </thead>
              <tbody id="systemLogsBody">
                <tr>
                  <td colspan="6" class="text-center text-muted py-4">
                    <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                    Loading&hellip;
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- Pagination -->
          <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-2">
            <span class="small text-muted" id="slPaginationInfo"></span>
            <nav>
              <ul class="pagination pagination-sm mb-0" id="slPaginationControls"></ul>
            </nav>
          </div>

        </div>
      </div>

      <!-- ═══════════════════════════════════
           TAB B: Audit Log
      ════════════════════════════════════ -->
      <div class="tab-pane fade" id="auditLogPane" role="tabpanel">
        <div class="content-card" style="border-top-left-radius:0;border-top-right-radius:0;">

          <!-- Filter bar -->
          <div class="row g-2 align-items-end mb-3">
            <div class="col-12 col-sm-6 col-md-3">
              <label class="form-label small fw-medium mb-1">Action</label>
              <input type="text" class="form-control form-control-sm text-uppercase" id="alAction"
                placeholder="e.g. CREATE_USER" />
            </div>
            <div class="col-12 col-sm-6 col-md-3">
              <label class="form-label small fw-medium mb-1">Target Type</label>
              <select class="form-select form-select-sm" id="alTargetType">
                <option value="">All types</option>
                <option value="user">User</option>
                <option value="course">Course</option>
                <option value="exam">Exam</option>
                <option value="enrollment">Enrollment</option>
                <option value="assignment">Assignment</option>
              </select>
            </div>
            <div class="col-auto">
              <button class="btn btn-primary btn-sm" onclick="loadAuditLogs(1)">
                <i class="bi bi-funnel me-1"></i>Filter
              </button>
            </div>
            <!-- Export CSV + Refresh — right aligned -->
            <div class="col-auto ms-auto">
              <button class="btn btn-outline-success btn-sm" onclick="exportAuditCsv()" id="exportCsvBtn"
                title="Export filtered audit log as CSV">
                <i class="bi bi-download me-1"></i>Export CSV
              </button>
              <button class="btn btn-outline-secondary btn-sm ms-1" onclick="loadAuditLogs(auditLogsPage)"
                title="Refresh">
                <i class="bi bi-arrow-clockwise"></i>
              </button>
            </div>
          </div>

          <!-- Audit logs table -->
          <div class="table-responsive-wrapper">
            <table class="table table-hover table-sm align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th style="width:40px">#</th>
                  <th style="width:180px">Action</th>
                  <th style="width:100px">Target Type</th>
                  <th style="width:80px">Target ID</th>
                  <th style="width:80px">Admin ID</th>
                  <th style="width:110px">IP Address</th>
                  <th>Details</th>
                  <th style="width:140px">Timestamp</th>
                </tr>
              </thead>
              <tbody id="auditLogsBody">
                <tr>
                  <td colspan="8" class="text-center text-muted py-4">
                    Click the &ldquo;Audit Log&rdquo; tab to load entries.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- Pagination -->
          <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-2">
            <span class="small text-muted" id="alPaginationInfo"></span>
            <nav>
              <ul class="pagination pagination-sm mb-0" id="alPaginationControls"></ul>
            </nav>
          </div>

        </div>
      </div>

    </div><!-- /.tab-content -->

  </div><!-- /#page-content -->


  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>

  <script src="/static/js/auth.js"></script>
  <script src="/static/js/sidebar.js"></script>
  <script src="/static/js/notifications.js"></script>

  <script src="/static/js/utils.js"></script>
  <script src="/static/js/admin/logs.js"></script>

</body>

</html>
