<!DOCTYPE html>
<html lang="en">
<!-- theme.js in <head> prevents flash of wrong theme -->

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Logs — EMS</title>
  <!-- theme.js FIRST — before Bootstrap CSS to prevent theme flash -->
  <script src="/static/js/theme.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/static/css/custom.css" />
</head>

<body>

  <!-- Sidebar injected here by sidebar.js -->
  <div id="sidebar-mount"></div>

  <!-- All page-specific content goes inside this div -->
  <div id="page-content" class="page-content">

    <!-- Notification bell row (injected by notifications.js) -->
    <div id="notification-bar" class="notification-bar"></div>

    <!-- Page header -->
    <div class="page-header">
      <h1 class="page-title">System Logs</h1>
    </div>

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-0" id="logsTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="systemLogsTab" data-bs-toggle="tab" data-bs-target="#systemLogsPane"
          type="button" role="tab">
          <i class="bi bi-journal-text me-1"></i>
          System Logs
          <span class="badge bg-secondary ms-1" id="systemLogsBadge">&mdash;</span>
        </button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="auditLogTab" data-bs-toggle="tab" data-bs-target="#auditLogPane" type="button"
          role="tab" onclick="if(!_auditLoaded){loadAuditLogs(1);}">
          <i class="bi bi-shield-lock-fill me-1"></i>
          Audit Log
          <span class="badge bg-secondary ms-1" id="auditLogBadge">&mdash;</span>
        </button>
      </li>
    </ul>

    <div class="tab-content">

      <!-- ═══════════════════════════════════
           TAB A: System Logs
      ════════════════════════════════════ -->
      <div class="tab-pane fade show active" id="systemLogsPane" role="tabpanel">
        <div class="content-card" style="border-top-left-radius:0;border-top-right-radius:0;">

          <!-- Filter bar -->
          <div class="row g-2 align-items-end mb-3">
            <div class="col-12 col-sm-6 col-md-4">
              <label class="form-label small fw-medium mb-1">Event Type</label>
              <select class="form-select form-select-sm" id="slEventType">
                <option value="">All events</option>
                <option value="exam_created">Exam Created</option>
                <option value="exam_published">Exam Published</option>
                <option value="results_published">Results Published</option>
                <option value="users_created">Users Created</option>
                <option value="course_created">Course Created</option>
                <option value="course_activated">Course Activated</option>
                <option value="course_deactivated">Course Deactivated</option>
              </select>
            </div>
            <div class="col-auto">
              <button class="btn btn-primary btn-sm" onclick="loadSystemLogs(1)">
                <i class="bi bi-funnel me-1"></i>Filter
              </button>
            </div>
            <div class="col-auto ms-auto">
              <button class="btn btn-outline-secondary btn-sm" onclick="loadSystemLogs(systemLogsPage)" title="Refresh">
                <i class="bi bi-arrow-clockwise"></i>
              </button>
            </div>
          </div>

          <!-- System logs table -->
          <div class="table-responsive-wrapper">
            <table class="table table-hover table-sm align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th style="width:40px">#</th>
                  <th style="width:160px">Event Type</th>
                  <th>Description</th>
                  <th style="width:80px">Actor ID</th>
                  <th style="width:200px">Metadata</th>
                  <th style="width:140px">Timestamp</th>
                </tr>
              </thead>
              <tbody id="systemLogsBody">
                <tr>
                  <td colspan="6" class="text-center text-muted py-4">
                    <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                    Loading&hellip;
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- Pagination -->
          <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-2">
            <span class="small text-muted" id="slPaginationInfo"></span>
            <nav>
              <ul class="pagination pagination-sm mb-0" id="slPaginationControls"></ul>
            </nav>
          </div>

        </div>
      </div>

      <!-- ═══════════════════════════════════
           TAB B: Audit Log
      ════════════════════════════════════ -->
      <div class="tab-pane fade" id="auditLogPane" role="tabpanel">
        <div class="content-card" style="border-top-left-radius:0;border-top-right-radius:0;">

          <!-- Filter bar -->
          <div class="row g-2 align-items-end mb-3">
            <div class="col-12 col-sm-6 col-md-3">
              <label class="form-label small fw-medium mb-1">Action</label>
              <input type="text" class="form-control form-control-sm text-uppercase" id="alAction"
                placeholder="e.g. CREATE_USER" />
            </div>
            <div class="col-12 col-sm-6 col-md-3">
              <label class="form-label small fw-medium mb-1">Target Type</label>
              <select class="form-select form-select-sm" id="alTargetType">
                <option value="">All types</option>
                <option value="user">User</option>
                <option value="course">Course</option>
                <option value="exam">Exam</option>
                <option value="enrollment">Enrollment</option>
                <option value="assignment">Assignment</option>
              </select>
            </div>
            <div class="col-auto">
              <button class="btn btn-primary btn-sm" onclick="loadAuditLogs(1)">
                <i class="bi bi-funnel me-1"></i>Filter
              </button>
            </div>
            <!-- Export CSV + Refresh — right aligned -->
            <div class="col-auto ms-auto">
              <button class="btn btn-outline-success btn-sm" onclick="exportAuditCsv()" id="exportCsvBtn"
                title="Export filtered audit log as CSV">
                <i class="bi bi-download me-1"></i>Export CSV
              </button>
              <button class="btn btn-outline-secondary btn-sm ms-1" onclick="loadAuditLogs(auditLogsPage)"
                title="Refresh">
                <i class="bi bi-arrow-clockwise"></i>
              </button>
            </div>
          </div>

          <!-- Audit logs table -->
          <div class="table-responsive-wrapper">
            <table class="table table-hover table-sm align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th style="width:40px">#</th>
                  <th style="width:180px">Action</th>
                  <th style="width:100px">Target Type</th>
                  <th style="width:80px">Target ID</th>
                  <th style="width:80px">Admin ID</th>
                  <th style="width:110px">IP Address</th>
                  <th>Details</th>
                  <th style="width:140px">Timestamp</th>
                </tr>
              </thead>
              <tbody id="auditLogsBody">
                <tr>
                  <td colspan="8" class="text-center text-muted py-4">
                    Click the &ldquo;Audit Log&rdquo; tab to load entries.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- Pagination -->
          <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-2">
            <span class="small text-muted" id="alPaginationInfo"></span>
            <nav>
              <ul class="pagination pagination-sm mb-0" id="alPaginationControls"></ul>
            </nav>
          </div>

        </div>
      </div>

    </div><!-- /.tab-content -->

  </div><!-- /#page-content -->


  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>

  <script src="/static/js/auth.js"></script>
  <script src="/static/js/sidebar.js"></script>
  <script src="/static/js/notifications.js"></script>

  <script>
    /**
     * admin/logs.html — page script
     * System Logs + Audit Logs with filtering, pagination, CSV export.
     */

    // ── State ─────────────────────────────────────────────────────────
    var systemLogsPage = 1;
    var auditLogsPage = 1;
    var _auditLoaded = false;

    // ── Auth ready — load system logs immediately ─────────────────────
    (function () {
      var prev = window.__onAuthReady;
      window.__onAuthReady = async function (user) {
        if (typeof prev === "function") await prev(user);
        await loadSystemLogs(1);
      };
    })();

    // ══════════════════════════════════════════════════════════════════
    // SYSTEM LOGS
    // ══════════════════════════════════════════════════════════════════

    async function loadSystemLogs(page) {
      systemLogsPage = page;
      var eventType = document.getElementById("slEventType").value;

      var url = "/api/admin/logs/system?page=" + page + "&page_size=20";
      if (eventType) url += "&event_type=" + encodeURIComponent(eventType);

      var tbody = document.getElementById("systemLogsBody");
      tbody.innerHTML = _loadingRow(6);

      try {
        var data = await window.apiFetch(url);
        if (!data) return;

        document.getElementById("systemLogsBadge").textContent = data.total;

        if (data.items.length === 0) {
          tbody.innerHTML = _emptyRow(6, "No system log entries found.");
          _renderPagination("slPaginationControls", "slPaginationInfo", data, "loadSystemLogs");
          return;
        }

        tbody.innerHTML = data.items.map(function (log, i) {
          var rowNum = (page - 1) * 20 + i + 1;
          var metaHtml = log.metadata
            ? '<code class="small text-muted d-block" ' +
            'style="max-width:190px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" ' +
            'title="' + _esc(JSON.stringify(log.metadata)) + '">' +
            _esc(JSON.stringify(log.metadata)) + '</code>'
            : '<span class="text-muted small">&mdash;</span>';

          return '<tr>' +
            '<td class="text-muted small">' + rowNum + '</td>' +
            '<td><span class="badge ' + _eventTypeBadge(log.event_type) +
            ' text-wrap text-start lh-sm" style="font-size:0.7rem">' +
            _formatEventType(log.event_type) + '</span></td>' +
            '<td class="small">' + _esc(log.description) + '</td>' +
            '<td class="small text-muted text-center">' + (log.actor_id || '&mdash;') + '</td>' +
            '<td>' + metaHtml + '</td>' +
            '<td class="small text-muted text-nowrap">' + _formatDateTime(log.created_at) + '</td>' +
            '</tr>';
        }).join("");

        _renderPagination("slPaginationControls", "slPaginationInfo", data, "loadSystemLogs");

      } catch (err) {
        tbody.innerHTML = _errorRow(6, err.detail || "Failed to load system logs.");
      }
    }

    function _eventTypeBadge(type) {
      var map = {
        exam_created: "bg-primary-subtle text-primary",
        exam_published: "bg-success-subtle text-success",
        results_published: "bg-info-subtle text-info",
        users_created: "bg-warning-subtle text-warning",
        course_created: "bg-secondary-subtle text-secondary",
        course_activated: "bg-success-subtle text-success",
        course_deactivated: "bg-danger-subtle text-danger",
      };
      return map[type] || "bg-secondary-subtle text-secondary";
    }

    function _formatEventType(type) {
      return (type || "").replace(/_/g, " ").replace(/\b\w/g, function (c) {
        return c.toUpperCase();
      });
    }

    // ══════════════════════════════════════════════════════════════════
    // AUDIT LOGS
    // ══════════════════════════════════════════════════════════════════

    async function loadAuditLogs(page) {
      _auditLoaded = true;
      auditLogsPage = page;
      var action = document.getElementById("alAction").value.trim().toUpperCase();
      var targetType = document.getElementById("alTargetType").value;

      var url = "/api/admin/logs/audit?page=" + page + "&page_size=20";
      if (action) url += "&action=" + encodeURIComponent(action);
      if (targetType) url += "&target_type=" + encodeURIComponent(targetType);

      var tbody = document.getElementById("auditLogsBody");
      tbody.innerHTML = _loadingRow(8);

      try {
        var data = await window.apiFetch(url);
        if (!data) return;

        document.getElementById("auditLogBadge").textContent = data.total;

        if (data.items.length === 0) {
          tbody.innerHTML = _emptyRow(8, "No audit log entries found.");
          _renderPagination("alPaginationControls", "alPaginationInfo", data, "loadAuditLogs");
          return;
        }

        tbody.innerHTML = data.items.map(function (log, i) {
          var rowNum = (page - 1) * 20 + i + 1;
          var detailsHtml = log.details
            ? '<code class="small text-muted d-block" ' +
            'style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" ' +
            'title="' + _esc(JSON.stringify(log.details)) + '">' +
            _esc(JSON.stringify(log.details)) + '</code>'
            : '<span class="text-muted small">&mdash;</span>';

          return '<tr>' +
            '<td class="text-muted small">' + rowNum + '</td>' +
            '<td><code class="small text-nowrap">' + _esc(log.action) + '</code></td>' +
            '<td><span class="badge ' + _targetTypeBadge(log.target_type) + '">' +
            _esc(log.target_type) + '</span></td>' +
            '<td class="small text-muted text-center">' + (log.target_id || '&mdash;') + '</td>' +
            '<td class="small text-muted text-center">' + (log.admin_id || '&mdash;') + '</td>' +
            '<td class="small font-monospace text-muted">' + _esc(log.ip_address) + '</td>' +
            '<td>' + detailsHtml + '</td>' +
            '<td class="small text-muted text-nowrap">' + _formatDateTime(log.created_at) + '</td>' +
            '</tr>';
        }).join("");

        _renderPagination("alPaginationControls", "alPaginationInfo", data, "loadAuditLogs");

      } catch (err) {
        tbody.innerHTML = _errorRow(8, err.detail || "Failed to load audit logs.");
      }
    }

    function _targetTypeBadge(type) {
      var map = {
        user: "bg-primary-subtle text-primary",
        course: "bg-success-subtle text-success",
        exam: "bg-warning-subtle text-warning",
        enrollment: "bg-info-subtle text-info",
        assignment: "bg-secondary-subtle text-secondary",
      };
      return map[type] || "bg-secondary-subtle text-secondary";
    }

    // ══════════════════════════════════════════════════════════════════
    // CSV EXPORT
    // ══════════════════════════════════════════════════════════════════

    async function exportAuditCsv() {
      var action = document.getElementById("alAction").value.trim().toUpperCase();
      var targetType = document.getElementById("alTargetType").value;
      var btn = document.getElementById("exportCsvBtn");

      var url = "/api/admin/logs/audit/export?";
      if (action) url += "action=" + encodeURIComponent(action) + "&";
      if (targetType) url += "target_type=" + encodeURIComponent(targetType) + "&";

      btn.disabled = true;
      btn.innerHTML =
        '<span class="spinner-border spinner-border-sm me-1" role="status"></span>Exporting&hellip;';

      try {
        // apiFetch returns the raw Response for non-JSON (CSV) content
        var response = await window.apiFetch(url);
        if (!response) return;

        var blob = await response.blob();

        // Extract filename from Content-Disposition header
        var disposition = response.headers.get("Content-Disposition") || "";
        var match = disposition.match(/filename=([^;]+)/);
        var filename = match ? match[1].trim() : "audit_log.csv";

        // Trigger browser download
        var objectUrl = URL.createObjectURL(blob);
        var anchor = document.createElement("a");
        anchor.href = objectUrl;
        anchor.download = filename;
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        URL.revokeObjectURL(objectUrl);

      } catch (err) {
        alert(err.detail || "CSV export failed. Please try again.");
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-download me-1"></i>Export CSV';
      }
    }

    // ══════════════════════════════════════════════════════════════════
    // SHARED PAGINATION RENDERER
    // ══════════════════════════════════════════════════════════════════

    function _renderPagination(navId, infoId, data, loadFnName) {
      var info = document.getElementById(infoId);
      var nav = document.getElementById(navId);

      var pageSize = data.page_size;
      var start = (data.page - 1) * pageSize + 1;
      var end = Math.min(data.page * pageSize, data.total);

      info.textContent = data.total > 0
        ? "Showing " + start + "\u2013" + end + " of " + data.total
        : "No entries";

      if (data.total_pages <= 1) {
        nav.innerHTML = "";
        return;
      }

      var html = "";

      // Previous
      html +=
        '<li class="page-item ' + (!data.has_prev ? "disabled" : "") + '">' +
        '<button class="page-link" onclick="' + loadFnName + '(' + (data.page - 1) + ')"' +
        (!data.has_prev ? " disabled" : "") + '>' +
        '<i class="bi bi-chevron-left"></i></button></li>';

      // Page numbers (sliding window)
      var startP = Math.max(1, data.page - 2);
      var endP = Math.min(data.total_pages, data.page + 2);

      if (startP > 1) {
        html += '<li class="page-item"><button class="page-link" ' +
          'onclick="' + loadFnName + '(1)">1</button></li>';
        if (startP > 2) {
          html += '<li class="page-item disabled"><span class="page-link">&hellip;</span></li>';
        }
      }

      for (var p = startP; p <= endP; p++) {
        html +=
          '<li class="page-item ' + (p === data.page ? "active" : "") + '">' +
          '<button class="page-link" onclick="' + loadFnName + '(' + p + ')">' +
          p + '</button></li>';
      }

      if (endP < data.total_pages) {
        if (endP < data.total_pages - 1) {
          html += '<li class="page-item disabled"><span class="page-link">&hellip;</span></li>';
        }
        html += '<li class="page-item"><button class="page-link" ' +
          'onclick="' + loadFnName + '(' + data.total_pages + ')">' +
          data.total_pages + '</button></li>';
      }

      // Next
      html +=
        '<li class="page-item ' + (!data.has_next ? "disabled" : "") + '">' +
        '<button class="page-link" onclick="' + loadFnName + '(' + (data.page + 1) + ')"' +
        (!data.has_next ? " disabled" : "") + '>' +
        '<i class="bi bi-chevron-right"></i></button></li>';

      nav.innerHTML = html;
    }

    // ══════════════════════════════════════════════════════════════════
    // UTILITY HELPERS
    // ══════════════════════════════════════════════════════════════════

    function _loadingRow(cols) {
      return '<tr><td colspan="' + cols + '" class="text-center text-muted py-4">' +
        '<div class="spinner-border spinner-border-sm me-2" role="status"></div>' +
        'Loading&hellip;</td></tr>';
    }

    function _emptyRow(cols, msg) {
      return '<tr><td colspan="' + cols + '" class="text-center text-muted py-4">' +
        '<i class="bi bi-inbox d-block fs-4 mb-1 opacity-50"></i>' +
        _esc(msg) + '</td></tr>';
    }

    function _errorRow(cols, msg) {
      return '<tr><td colspan="' + cols + '" class="text-center text-danger py-4">' +
        '<i class="bi bi-exclamation-triangle me-2"></i>' +
        _esc(msg) + '</td></tr>';
    }

    function _formatDateTime(iso) {
      if (!iso) return "&mdash;";
      return new Date(iso).toLocaleString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function _esc(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

  </script>
</body>

</html>
