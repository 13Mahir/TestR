<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discussion Forum — TestR</title>
    <script src="/static/js/theme.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/static/css/custom.css" />
    <style>
        .post-item {
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .post-item:hover {
            background-color: var(--bs-tertiary-bg);
        }

        .pinned-badge {
            font-size: 0.75rem;
            vertical-align: middle;
        }

        .author-badge {
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 1rem;
        }

        .badge-admin {
            background-color: var(--bs-danger);
            color: white;
        }

        .badge-teacher {
            background-color: var(--bs-success);
            color: white;
        }

        .badge-student {
            background-color: var(--bs-primary);
            color: white;
        }

        .reply-card {
            border-left: 4px solid var(--bs-primary-border-subtle);
        }

        .sticky-composer {
            position: sticky;
            bottom: 0;
            z-index: 100;
            background: var(--bs-body-bg);
            border-top: 1px solid var(--bs-border-color);
            padding: 1rem 0;
        }

        .char-counter {
            font-size: 0.8rem;
            color: var(--bs-secondary-color);
        }

        .char-counter.limit-near {
            color: var(--bs-danger);
        }

        #view-post-detail {
            display: none;
        }

        .search-wrapper {
            position: relative;
        }

        .search-clear {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            display: none;
        }
    </style>
</head>

<body>
    <div id="sidebar-mount"></div>
    <div id="page-content" class="page-content">
        <div id="notification-bar" class="notification-bar"></div>

        <!-- VIEW A: POST LIST -->
        <div id="view-post-list">
            <div class="page-header d-flex justify-content-between align-items-center mb-4">
                <h4 class="mb-0 fw-bold">Discussion Forum</h4>
                <div id="new-post-btn-wrapper"></div>
            </div>

            <div class="search-wrapper mb-4">
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input type="text" id="forum-search" class="form-control" placeholder="Search posts..." />
                    <i class="bi bi-x-circle-fill search-clear text-muted" id="search-clear-btn"></i>
                </div>
            </div>

            <div id="posts-container" class="list-group mb-4">
                <!-- Rendered posts here -->
            </div>

            <nav id="forum-pagination" aria-label="Forum pagination"></nav>
        </div>

        <!-- VIEW B: POST DETAIL -->
        <div id="view-post-detail">
            <div class="mb-4">
                <button class="btn btn-link p-0 text-decoration-none" onclick="backToList()">
                    <i class="bi bi-arrow-left"></i> Back to Forum
                </button>
            </div>

            <div id="post-detail-content">
                <!-- Full post and replies rendered here -->
            </div>
        </div>
    </div>

    <!-- NEW POST MODAL -->
    <div class="modal fade" id="newPostModal" tabindex="-1" aria-labelledby="newPostModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="newPostModalLabel">New Post</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="modal-alert" class="alert alert-danger d-none" role="alert"></div>
                    <form id="new-post-form">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Post Title</label>
                            <input type="text" id="post-title" class="form-control"
                                placeholder="Enter title (5-255 characters)" required minlength="5" maxlength="255">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Body</label>
                            <textarea id="post-body" class="form-control" rows="6"
                                placeholder="Write something... (10-5000 characters)" required minlength="10"
                                maxlength="5000"></textarea>
                            <div class="d-flex justify-content-end mt-1">
                                <span id="post-body-count" class="char-counter">0 / 5000</span>
                            </div>
                        </div>

                        <hr />
                        <h6 class="fw-bold mb-3"><i class="bi bi-shield-lock"></i> Access Control (Optional)</h6>
                        <p class="small text-muted mb-3">Leave these empty for a public post. If set, only matching
                            students or specific emails can view/reply.</p>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Target School</label>
                                <select id="restrict-school" class="form-select form-select-sm">
                                    <option value="">-- All Schools --</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Target Branch</label>
                                <select id="restrict-branch" class="form-select form-select-sm" disabled>
                                    <option value="">-- All Branches --</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small fw-bold">Batch Year (YY)</label>
                                <input type="text" id="restrict-year" class="form-control form-select-sm"
                                    placeholder="e.g. 23" maxlength="2">
                            </div>
                            <div class="col-md-8">
                                <label class="form-label small fw-bold">Specific Emails (Comma separated)</label>
                                <input type="text" id="restrict-emails" class="form-control form-select-sm"
                                    placeholder="user@example.com, ...">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="btn-submit-post"
                        onclick="submitNewPost()">Post</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/sidebar.js"></script>
    <!-- notifications.js is expected to be present -->
    <script src="/static/js/notifications.js"></script>

    <script src="/static/js/utils.js"></script>
    <script src="/static/js/discussion.js"></script>

</body>

</html>
