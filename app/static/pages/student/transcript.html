<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>My Transcript — EMS</title>
    <script src="/static/js/theme.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/static/css/custom.css" />
    <!-- Chart.js for trend line -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body>
    <div id="sidebar-mount"></div>
    <div id="page-content" class="page-content">
        <div id="notification-bar" class="notification-bar"></div>

        <div class="page-header">
            <h1 class="page-title">My Transcript</h1>
        </div>

        <!-- Summary row -->
        <div class="row g-3 mb-4" id="transcriptSummary">
            <div class="col-12 text-center py-3">
                <div class="spinner-border spinner-border-sm" role="status"></div>
            </div>
        </div>

        <!-- Trend chart -->
        <div class="content-card mb-3" id="trendCard">
            <h6 class="fw-semibold mb-3">
                <i class="bi bi-graph-up text-success me-2"></i>
                Score Trend
            </h6>
            <div id="noTrendMsg" class="text-center text-muted
                                py-3 d-none small">
                Not enough results to show a trend.
            </div>
            <div style="position:relative;height:180px" id="trendWrapper">
                <canvas id="trendChart"></canvas>
            </div>
        </div>

        <!-- Full transcript table -->
        <div class="content-card">
            <h6 class="fw-semibold mb-3">
                <i class="bi bi-table text-primary me-2"></i>
                All Results
            </h6>
            <div class="table-responsive-wrapper">
                <table class="table table-hover table-sm
                    align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Course</th>
                            <th>Exam</th>
                            <th>Score</th>
                            <th>%</th>
                            <th>P/F</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="transcriptTableBody">
                        <tr>
                            <td colspan="7" class="text-center text-muted py-4">
                                <div class="spinner-border spinner-border-sm
                           me-2" role="status"></div>
                                Loading...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/sidebar.js"></script>
    <script src="/static/js/notifications.js"></script>

    <script>
        let trendChartInstance = null;

        (function () {
            const prev = window.__onAuthReady;
            window.__onAuthReady = async function (user) {
                if (typeof prev === "function") await prev(user);
                await loadTranscript();
            };
        })();

        async function loadTranscript() {
            try {
                const data = await window.apiFetch("/api/student/transcript");
                if (!data) return;

                renderSummary(data);
                renderTable(data.entries);
                renderTrend(data.entries);

            } catch (err) {
                document.getElementById("transcriptSummary").innerHTML = `
      <div class="col-12 text-center text-danger py-3 small">
        <i class="bi bi-exclamation-triangle me-2"></i>
        ${_esc(err.detail || "Failed to load transcript.")}
      </div>`;
            }
        }

        // ── Summary cards ─────────────────────────────────────────────────

        function renderSummary(data) {
            const passRate = data.total > 0
                ? Math.round(data.pass_count / data.total * 100)
                : 0;

            document.getElementById("transcriptSummary").innerHTML = `
    <div class="col-6 col-md-3">
      <div class="content-card bg-primary-subtle text-center py-3">
        <div class="fw-bold fs-5 text-primary">${data.total}</div>
        <div class="small text-muted">Exams Taken</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="content-card bg-success-subtle text-center py-3">
        <div class="fw-bold fs-5 text-success">
          ${data.pass_count}
        </div>
        <div class="small text-muted">Passed</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="content-card bg-danger-subtle text-center py-3">
        <div class="fw-bold fs-5 text-danger">
          ${data.fail_count}
        </div>
        <div class="small text-muted">Failed</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="content-card bg-info-subtle text-center py-3">
        <div class="fw-bold fs-5 text-info">
          ${data.overall_avg}%
        </div>
        <div class="small text-muted">Overall Average</div>
      </div>
    </div>`;
        }

        // ── Transcript table ──────────────────────────────────────────────

        function renderTable(entries) {
            const tbody = document.getElementById("transcriptTableBody");
            if (!entries.length) {
                tbody.innerHTML = `
      <tr>
        <td colspan="7" class="text-center text-muted py-4">
          <i class="bi bi-inbox fs-3 d-block
                    mb-1 opacity-50"></i>
          No published results yet.
        </td>
      </tr>`;
                return;
            }
            tbody.innerHTML = entries.map((e, i) => `
    <tr>
      <td class="text-muted small">${i + 1}</td>
      <td>
        <span class="badge bg-secondary-subtle
                     text-secondary small">
          ${_esc(e.course_code)}
        </span>
        <div class="small text-muted">${_esc(e.course_name)}</div>
      </td>
      <td class="small">${_esc(e.exam_title)}</td>
      <td class="small text-nowrap">
        <strong>${e.total_marks_awarded}</strong>
        / ${e.total_marks_available}
      </td>
      <td class="small">
        <span class="${e.percentage >= 50
                    ? 'text-success' : 'text-danger'}
          fw-semibold">
          ${e.percentage}%
        </span>
      </td>
      <td>
        <span class="badge ${e.is_pass === true
                    ? 'bg-success'
                    : e.is_pass === false
                        ? 'bg-danger'
                        : 'bg-secondary'} small">
          ${e.is_pass === true ? 'PASS'
                    : e.is_pass === false ? 'FAIL' : '—'}
        </span>
      </td>
      <td class="small text-muted text-nowrap">
        ${_formatDate(e.results_published_at)}
      </td>
    </tr>`).join("");
        }

        // ── Trend chart ───────────────────────────────────────────────────

        function renderTrend(entries) {
            const wrapper = document.getElementById("trendWrapper");
            const noMsg = document.getElementById("noTrendMsg");

            // Need at least 2 data points for a trend
            if (entries.length < 2) {
                wrapper.classList.add("d-none");
                noMsg.classList.remove("d-none");
                return;
            }

            // Reverse so oldest is first (left to right = chronological)
            const ordered = [...entries].reverse();
            const labels = ordered.map((e, i) =>
                `${e.course_code} #${i + 1}`
            );
            const scores = ordered.map(e => e.percentage);

            if (trendChartInstance) trendChartInstance.destroy();

            const isDark = document.documentElement
                .getAttribute("data-bs-theme") === "dark";
            const gridColor = isDark
                ? "rgba(255,255,255,0.1)" : "rgba(0,0,0,0.08)";
            const labelColor = isDark ? "#adb5bd" : "#6c757d";

            trendChartInstance = new Chart(
                document.getElementById("trendChart"),
                {
                    type: "line",
                    data: {
                        labels,
                        datasets: [{
                            label: "Score %",
                            data: scores,
                            borderColor: "#198754",
                            backgroundColor: "rgba(25,135,84,0.12)",
                            pointBackgroundColor: scores.map(s =>
                                s >= 50 ? "#198754" : "#dc3545"
                            ),
                            tension: 0.35,
                            fill: true,
                            pointRadius: 5,
                        }],
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: 100,
                                ticks: {
                                    color: labelColor,
                                    callback: v => v + "%",
                                },
                                grid: { color: gridColor },
                            },
                            x: {
                                ticks: {
                                    color: labelColor,
                                    maxRotation: 30,
                                    autoSkip: true,
                                },
                                grid: { display: false },
                            },
                        },
                    },
                }
            );
        }

        function _formatDate(iso) {
            if (!iso) return "—";
            return new Date(iso).toLocaleDateString(undefined,
                { year: "numeric", month: "short", day: "numeric" });
        }

        function _esc(s) {
            return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;")
                .replace(/>/g, "&gt;").replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>

</html>
