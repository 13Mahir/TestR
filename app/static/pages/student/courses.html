<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My Courses — EMS</title>
  <script src="/static/js/theme.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/static/css/custom.css" />
</head>

<body>
  <div id="sidebar-mount"></div>
  <div id="page-content" class="page-content">
    <div id="notification-bar" class="notification-bar"></div>

    <div class="page-header">
      <h1 class="page-title">My Courses</h1>
    </div>

    <div class="row g-3" id="coursesGrid">
      <div class="col-12 text-center py-5">
        <div class="spinner-border" role="status"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/sidebar.js"></script>
  <script src="/static/js/notifications.js"></script>

  <script>
    (function () {
      const prev = window.__onAuthReady;
      window.__onAuthReady = async function (user) {
        if (typeof prev === "function") await prev(user);
        await loadCourses();
      };
    })();

    async function loadCourses() {
      const grid = document.getElementById("coursesGrid");
      try {
        const data = await window.apiFetch("/api/student/courses");
        if (!data || !data.items.length) {
          grid.innerHTML = `
        <div class="col-12 text-center text-muted py-5">
          <i class="bi bi-journal-x fs-1 d-block
                    mb-2 opacity-50"></i>
          <p>You are not enrolled in any courses yet.</p>
          <p class="small">Contact your administrator.</p>
        </div>`;
          return;
        }

        grid.innerHTML = data.items.map(c => `
      <div class="col-12 col-md-6 col-lg-4">
        <div class="content-card h-100">
          <div class="d-flex justify-content-between
                      align-items-start mb-2">
            <div class="d-flex gap-1 flex-wrap">
              <span class="badge bg-secondary-subtle
                           text-secondary small">
                ${_esc(c.course_code)}
              </span>
              <span class="badge ${c.mode === 'T'
            ? 'bg-primary-subtle text-primary'
            : 'bg-info-subtle text-info'} small">
                ${c.mode === 'T' ? 'Theory' : 'Practical'}
              </span>
            </div>
            <span class="badge ${c.is_active
            ? 'bg-success-subtle text-success'
            : 'bg-danger-subtle text-danger'} small">
              ${c.is_active ? 'Active' : 'Inactive'}
            </span>
          </div>
          <h5 class="fw-semibold mb-1">${_esc(c.name)}</h5>
          <p class="small text-muted mb-3">
            ${c.description
            ? _esc(c.description.substring(0, 100))
            + (c.description.length > 100 ? '…' : '')
            : 'No description.'}
          </p>
          <div class="row g-2 mb-3">
            <div class="col-6">
              <div class="bg-primary-subtle rounded p-2
                          text-center">
                <div class="fw-bold text-primary">
                  ${c.upcoming_exams}
                </div>
                <div class="small text-muted">Upcoming</div>
              </div>
            </div>
            <div class="col-6">
              <div class="bg-success-subtle rounded p-2
                          text-center">
                <div class="fw-bold text-success">
                  ${c.completed_exams}
                </div>
                <div class="small text-muted">Completed</div>
              </div>
            </div>
          </div>
          <div class="small text-muted mb-3">
            <i class="bi bi-calendar3 me-1"></i>
            Enrolled ${_formatDate(c.enrolled_at)}
            · Batch '${_esc(c.year)}
          </div>
          <a href="/static/pages/student/exam_lobby.html?course_id=${c.id}"
             class="btn btn-outline-primary btn-sm w-100">
            <i class="bi bi-list-check me-1"></i>
            View Exams
          </a>
        </div>
      </div>`).join("");

      } catch (err) {
        grid.innerHTML = `
      <div class="col-12 text-center text-danger py-4">
        <i class="bi bi-exclamation-triangle me-2"></i>
        ${_esc(err.detail || "Failed to load courses.")}
      </div>`;
      }
    }

    function _formatDate(iso) {
      if (!iso) return "—";
      return new Date(iso).toLocaleDateString(undefined,
        { year: "numeric", month: "short", day: "numeric" });
    }

    function _esc(s) {
      return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>

</html>
