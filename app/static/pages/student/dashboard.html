<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Dashboard — EMS</title>
    <script src="/static/js/theme.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/static/css/custom.css" />
    <!-- Add Chart.js after Bootstrap CSS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body>
    <div id="sidebar-mount"></div>
    <div id="page-content" class="page-content">
        <div id="notification-bar" class="notification-bar"></div>

        <div class="page-header">
            <h1 class="page-title" id="welcomeHeading">Dashboard</h1>
        </div>

        <!-- Summary stat cards -->
        <div class="row g-3 mb-4" id="summaryCards">
            <div class="col-12 text-center py-3">
                <div class="spinner-border spinner-border-sm" role="status"></div>
            </div>
        </div>

        <div class="row g-3">

            <!-- Left column -->
            <div class="col-12 col-lg-7">

                <!-- Recent results -->
                <div class="content-card mb-3">
                    <h6 class="fw-semibold mb-3">
                        <i class="bi bi-trophy-fill text-warning me-2"></i>
                        Recent Results
                    </h6>
                    <div id="recentResultsArea">
                        <div class="text-center text-muted py-3">
                            <div class="spinner-border spinner-border-sm" role="status"></div>
                        </div>
                    </div>
                </div>

                <!-- Subject performance chart -->
                <div class="content-card">
                    <h6 class="fw-semibold mb-3">
                        <i class="bi bi-bar-chart-fill text-primary me-2"></i>
                        Performance by Subject
                    </h6>
                    <div id="noChartMsg" class="text-center text-muted
                                     py-3 d-none">
                        <i class="bi bi-bar-chart fs-3 d-block
                     mb-1 opacity-50"></i>
                        No results yet. Attempt some exams to see your
                        performance chart.
                    </div>
                    <div style="position:relative;height:220px" id="chartWrapper">
                        <canvas id="perfChart"></canvas>
                    </div>
                </div>

            </div>

            <!-- Right column -->
            <div class="col-12 col-lg-5">

                <!-- Upcoming exams -->
                <div class="content-card">
                    <h6 class="fw-semibold mb-3">
                        <i class="bi bi-calendar-event-fill
                    text-primary me-2"></i>
                        Upcoming Exams
                    </h6>
                    <div id="upcomingExamsArea">
                        <div class="text-center text-muted py-3">
                            <div class="spinner-border spinner-border-sm" role="status"></div>
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/sidebar.js"></script>
    <script src="/static/js/notifications.js"></script>
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/student/dashboard.js"></script>
</body>

</html>
