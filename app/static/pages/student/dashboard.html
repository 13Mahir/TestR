<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Dashboard — EMS</title>
    <script src="/static/js/theme.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/static/css/custom.css" />
    <!-- Add Chart.js after Bootstrap CSS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body>
    <div id="sidebar-mount"></div>
    <div id="page-content" class="page-content">
        <div id="notification-bar" class="notification-bar"></div>

        <div class="page-header">
            <h1 class="page-title" id="welcomeHeading">Dashboard</h1>
        </div>

        <!-- Summary stat cards -->
        <div class="row g-3 mb-4" id="summaryCards">
            <div class="col-12 text-center py-3">
                <div class="spinner-border spinner-border-sm" role="status"></div>
            </div>
        </div>

        <div class="row g-3">

            <!-- Left column -->
            <div class="col-12 col-lg-7">

                <!-- Recent results -->
                <div class="content-card mb-3">
                    <h6 class="fw-semibold mb-3">
                        <i class="bi bi-trophy-fill text-warning me-2"></i>
                        Recent Results
                    </h6>
                    <div id="recentResultsArea">
                        <div class="text-center text-muted py-3">
                            <div class="spinner-border spinner-border-sm" role="status"></div>
                        </div>
                    </div>
                </div>

                <!-- Subject performance chart -->
                <div class="content-card">
                    <h6 class="fw-semibold mb-3">
                        <i class="bi bi-bar-chart-fill text-primary me-2"></i>
                        Performance by Subject
                    </h6>
                    <div id="noChartMsg" class="text-center text-muted
                                    py-3 d-none">
                        <i class="bi bi-bar-chart fs-3 d-block
                    mb-1 opacity-50"></i>
                        No results yet. Attempt some exams to see your
                        performance chart.
                    </div>
                    <div style="position:relative;height:220px" id="chartWrapper">
                        <canvas id="perfChart"></canvas>
                    </div>
                </div>

            </div>

            <!-- Right column -->
            <div class="col-12 col-lg-5">

                <!-- Upcoming exams -->
                <div class="content-card">
                    <h6 class="fw-semibold mb-3">
                        <i class="bi bi-calendar-event-fill
                    text-primary me-2"></i>
                        Upcoming Exams
                    </h6>
                    <div id="upcomingExamsArea">
                        <div class="text-center text-muted py-3">
                            <div class="spinner-border spinner-border-sm" role="status"></div>
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/sidebar.js"></script>
    <script src="/static/js/notifications.js"></script>

    <script>
        let perfChartInstance = null;

        (function () {
            const prev = window.__onAuthReady;
            window.__onAuthReady = async function (user) {
                if (typeof prev === "function") await prev(user);
                document.getElementById("welcomeHeading").textContent =
                    `Welcome, ${user.first_name} 👋`;
                await loadDashboard();
            };
        })();

        async function loadDashboard() {
            try {
                const data = await window.apiFetch("/api/student/dashboard");
                if (!data) return;

                renderSummaryCards(data.summary);
                renderRecentResults(data.recent_results);
                renderUpcomingExams(data.upcoming_exams);
                renderPerfChart(data.subject_performance);

            } catch (err) {
                document.getElementById("summaryCards").innerHTML = `
      <div class="col-12 text-danger small text-center py-2">
        <i class="bi bi-exclamation-triangle me-2"></i>
        ${_esc(err.detail || "Failed to load dashboard.")}
      </div>`;
            }
        }

        // ── Summary cards ─────────────────────────────────────────────────

        function renderSummaryCards(summary) {
            document.getElementById("summaryCards").innerHTML = `
    ${_miniCard("bi-journal-check text-primary",
                summary.total_attempted, "Exams Attempted",
                "bg-primary-subtle")}
    ${_miniCard("bi-check-circle-fill text-success",
                    summary.total_pass, "Exams Passed",
                    "bg-success-subtle")}
    ${_miniCard("bi-percent text-info",
                        summary.pass_rate + "%", "Pass Rate",
                        "bg-info-subtle")}
    ${_miniCard("bi-bar-chart-fill text-warning",
                            summary.average_pct + "%", "Avg Score",
                            "bg-warning-subtle")}`;
        }

        function _miniCard(iconCls, value, label, bgCls) {
            return `
    <div class="col-6 col-md-3">
      <div class="content-card ${bgCls} text-center py-3">
        <i class="bi ${iconCls} fs-4 d-block mb-1"></i>
        <div class="fw-bold fs-5">${value}</div>
        <div class="small text-muted">${label}</div>
      </div>
    </div>`;
        }

        // ── Recent results ────────────────────────────────────────────────

        function renderRecentResults(results) {
            const area = document.getElementById("recentResultsArea");
            if (!results.length) {
                area.innerHTML = `
      <div class="text-center text-muted py-3 small">
        <i class="bi bi-inbox fs-3 d-block mb-1 opacity-50"></i>
        No published results yet.
      </div>`;
                return;
            }
            area.innerHTML = results.map(r => `
    <div class="d-flex align-items-center gap-3 py-2
                border-bottom">
      <div class="flex-fill min-w-0">
        <div class="small fw-semibold text-truncate">
          ${_esc(r.exam_title)}
        </div>
        <div class="small text-muted">
          ${_esc(r.course_code)}
        </div>
      </div>
      <div class="text-end flex-shrink-0">
        <div class="small fw-bold ${r.is_pass
                    ? 'text-success' : 'text-danger'}">
          ${r.total_marks_awarded} /
          ${r.total_marks_available}
        </div>
        <div class="small text-muted">${r.percentage}%</div>
      </div>
      <span class="badge ${r.is_pass === true
                    ? 'bg-success'
                    : r.is_pass === false
                        ? 'bg-danger'
                        : 'bg-secondary'} flex-shrink-0">
        ${r.is_pass === true ? 'PASS'
                    : r.is_pass === false ? 'FAIL' : '—'}
      </span>
    </div>`).join("");
        }

        // ── Upcoming exams ────────────────────────────────────────────────

        function renderUpcomingExams(exams) {
            const area = document.getElementById("upcomingExamsArea");
            if (!exams.length) {
                area.innerHTML = `
      <div class="text-center text-muted py-3 small">
        <i class="bi bi-calendar-x fs-3 d-block
                  mb-1 opacity-50"></i>
        No upcoming exams.
      </div>`;
                return;
            }
            area.innerHTML = exams.map(e => {
                const start = new Date(e.start_time);
                const now = new Date();
                const mins = Math.round((start - now) / 60000);
                const soon = mins <= 30 && mins >= -5;
                return `
      <div class="border rounded p-2 mb-2
                  ${soon ? 'border-warning bg-warning-subtle'
                        : ''}">
        <div class="d-flex justify-content-between
                    align-items-start">
          <div class="flex-fill min-w-0 me-2">
            <div class="small fw-semibold text-truncate">
              ${_esc(e.title)}
            </div>
            <div class="small text-muted">
              ${_esc(e.course_code)} ·
              ${e.duration_minutes}min ·
              ${e.total_marks} marks
            </div>
          </div>
          ${e.has_attempted
                        ? `<span class="badge bg-secondary-subtle
                            text-secondary small">Done</span>`
                        : `<a href="/static/pages/student/exam_lobby.html?exam_id=${e.id}"
                 class="btn btn-primary btn-sm">
                 Enter
               </a>`}
        </div>
        <div class="small text-muted mt-1">
          <i class="bi bi-clock me-1"></i>
          ${start.toLocaleString()}
          ${soon && !e.has_attempted
                        ? '<span class="text-warning fw-semibold ms-1">'
                        + '● Starting soon</span>'
                        : ''}
        </div>
      </div>`;
            }).join("");
        }

        // ── Performance chart ─────────────────────────────────────────────

        function renderPerfChart(performance) {
            const wrapper = document.getElementById("chartWrapper");
            const noMsg = document.getElementById("noChartMsg");

            if (!performance.length) {
                wrapper.classList.add("d-none");
                noMsg.classList.remove("d-none");
                return;
            }

            const labels = performance.map(p => p.course_code);
            const avgs = performance.map(p => p.average_pct);
            const passes = performance.map(p => p.pass_count);
            const fails = performance.map(p => p.fail_count);

            if (perfChartInstance) perfChartInstance.destroy();

            const isDark = document.documentElement
                .getAttribute("data-bs-theme") === "dark";
            const gridColor = isDark
                ? "rgba(255,255,255,0.1)"
                : "rgba(0,0,0,0.08)";
            const labelColor = isDark ? "#adb5bd" : "#6c757d";

            perfChartInstance = new Chart(
                document.getElementById("perfChart"),
                {
                    type: "bar",
                    data: {
                        labels,
                        datasets: [
                            {
                                label: "Avg %",
                                data: avgs,
                                backgroundColor: "rgba(13,110,253,0.7)",
                                borderRadius: 4,
                                yAxisID: "y",
                            },
                        ],
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    afterLabel: (ctx) => {
                                        const i = ctx.dataIndex;
                                        return `Pass: ${passes[i]}  Fail: ${fails[i]}`;
                                    },
                                },
                            },
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: 100,
                                ticks: {
                                    color: labelColor,
                                    callback: v => v + "%"
                                },
                                grid: { color: gridColor },
                            },
                            x: {
                                ticks: { color: labelColor },
                                grid: { display: false },
                            },
                        },
                    },
                }
            );
        }

        function _esc(s) {
            return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;")
                .replace(/>/g, "&gt;").replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>

</html>
