<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Exam Lobby — EMS</title>
  <script src="/static/js/theme.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/static/css/custom.css" />
  <style>
    .page-content { padding-top: 1rem !important; padding-bottom: 1rem !important; }
    .content-card { padding: 1rem !important; }
    .page-title { font-size: 1.1rem; }
  </style>
</head>
 
<body>
  <div id="sidebar-mount"></div>
  <div id="page-content" class="page-content">
    <div id="notification-bar" class="notification-bar"></div>
 
    <div class="d-flex align-items-center gap-3 mb-2">
      <a href="/static/pages/student/courses.html" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>My Courses
      </a>
      <h1 class="page-title mb-0">Exam Lobby</h1>
    </div>

    <!-- Course exam list (shown when ?course_id provided) -->
    <div id="courseExamsArea" class="d-none">
      <div class="row g-3" id="courseExamsList"></div>
    </div>

    <!-- Single exam lobby (shown when ?exam_id provided) -->
    <div id="singleLobbyArea" class="d-none">
      <div class="content-card w-100" id="lobbyCard">
        <div class="text-center py-4">
          <div class="spinner-border" role="status"></div>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/sidebar.js"></script>
  <script src="/static/js/notifications.js"></script>
  <script src="/static/js/utils.js"></script>
  <script src="/static/js/student/exam_lobby.js"></script>
</body>

</html>
