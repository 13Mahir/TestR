<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Exam Lobby — EMS</title>
  <script src="/static/js/theme.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/static/css/custom.css" />
  <style>
    .page-content { padding-top: 1rem !important; padding-bottom: 1rem !important; }
    .content-card { padding: 1rem !important; }
    .page-title { font-size: 1.1rem; }
  </style>
</head>
 
<body>
  <div id="sidebar-mount"></div>
  <div id="page-content" class="page-content">
    <div id="notification-bar" class="notification-bar"></div>
 
    <div class="d-flex align-items-center gap-3 mb-2">
      <a href="/static/pages/student/courses.html" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>My Courses
      </a>
      <h1 class="page-title mb-0">Exam Lobby</h1>
    </div>

    <!-- Course exam list (shown when ?course_id provided) -->
    <div id="courseExamsArea" class="d-none">
      <div class="row g-3" id="courseExamsList"></div>
    </div>

    <!-- Single exam lobby (shown when ?exam_id provided) -->
    <div id="singleLobbyArea" class="d-none">
      <div class="content-card w-100" id="lobbyCard">
        <div class="text-center py-4">
          <div class="spinner-border" role="status"></div>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/sidebar.js"></script>
  <script src="/static/js/notifications.js"></script>

  <script>
    const urlP = new URLSearchParams(window.location.search);
    const examId = parseInt(urlP.get("exam_id")) || null;
    const courseId = parseInt(urlP.get("course_id")) || null;
    let pollTimer = null;

    (function () {
      const prev = window.__onAuthReady;
      window.__onAuthReady = async function (user) {
        if (typeof prev === "function") await prev(user);
        if (examId) {
          document.getElementById("singleLobbyArea")
            .classList.remove("d-none");
          await loadLobby();
          // Poll eligibility every 30s so page updates
          // automatically when exam window opens
          pollTimer = setInterval(loadLobby, 30000);
        } else if (courseId) {
          document.getElementById("courseExamsArea")
            .classList.remove("d-none");
          await loadCourseExams();
        } else {
          document.getElementById("singleLobbyArea")
            .classList.remove("d-none");
          document.getElementById("lobbyCard").innerHTML = `
        <div class="text-center text-muted py-4">
          <i class="bi bi-exclamation-triangle fs-2
                    d-block mb-2"></i>
          No exam or course ID in URL.
          <a href="/static/pages/student/courses.html"
             class="d-block mt-2">Back to courses</a>
        </div>`;
        }
      };
    })();

    // ── Single exam lobby ─────────────────────────────────────────────

    async function loadLobby() {
      const card = document.getElementById("lobbyCard");
      try {
        const e = await window.apiFetch(
          `/api/student/exams/${examId}/lobby`
        );
        if (!e) return;

        const start = new Date(e.start_time);
        const end = new Date(e.end_time);
        const now = new Date();
        const minsUntil = Math.max(0,
          Math.round((start - now) / 60000));
        const hasEnded = now > end;

        card.innerHTML = `
      <div class="text-center mb-3">
        <h4 class="fw-bold mb-1">${_esc(e.title)}</h4>
        <span class="badge bg-secondary-subtle
                     text-secondary">
          ${_esc(e.course_code)}
        </span>
      </div>
 
      <div class="row g-3 mb-3">
        <div class="col-sm-6 col-md-3">
          <div class="bg-body-secondary rounded p-2
                      text-center">
            <div class="fw-bold text-primary">
              ${e.duration_minutes}
            </div>
            <div class="small text-muted">Minutes</div>
          </div>
        </div>
        <div class="col-sm-6 col-md-3">
          <div class="bg-body-secondary rounded p-2
                      text-center">
            <div class="fw-bold text-primary">
              ${e.total_marks}
            </div>
            <div class="small text-muted">Total Marks</div>
          </div>
        </div>
        <div class="col-sm-6 col-md-3">
          <div class="bg-body-secondary rounded p-2
                      text-center">
            <div class="fw-bold text-primary">
              ${e.passing_marks}
            </div>
            <div class="small text-muted">Passing Marks</div>
          </div>
        </div>
        <div class="col-sm-6 col-md-3">
          <div class="bg-body-secondary rounded p-2
                      text-center">
            <div class="fw-bold text-primary">
              ${e.question_count}
            </div>
            <div class="small text-muted">Questions</div>
          </div>
        </div>
      </div>
 
      <div class="mb-2 small">
        <div class="d-flex justify-content-between
                    border-bottom py-1">
          <span class="text-muted">Start</span>
          <span>${start.toLocaleString()}</span>
        </div>
        <div class="d-flex justify-content-between
                    border-bottom py-1">
          <span class="text-muted">End</span>
          <span>${end.toLocaleString()}</span>
        </div>
        ${e.negative_marking_factor > 0
            ? `<div class="d-flex justify-content-between py-1">
               <span class="text-muted">Negative Marking</span>
               <span class="text-danger">
                 -${e.negative_marking_factor}× per wrong MCQ
               </span>
             </div>`
            : ""}
      </div>
 
      <div class="alert ${e.can_attempt
            ? 'alert-success'
            : hasEnded
               ? 'alert-secondary'
               : 'alert-info'} d-flex align-items-center gap-2 mb-2">
        <i class="bi ${e.can_attempt
            ? 'bi-check-circle-fill'
            : hasEnded
               ? 'bi-lock-fill'
               : 'bi-clock-fill'} flex-shrink-0"></i>
        <div>
          ${e.can_attempt
            ? "Exam window is open. You may begin now."
            : _esc(e.reason || "Check back later.")}
          ${!e.can_attempt && !hasEnded && minsUntil > 0
            ? `<div class="fw-bold">
                 Starts in ${minsUntil} minute${minsUntil !== 1 ? 's' : ''}
               </div>`
            : ""}
        </div>
      </div>
 
      ${e.can_attempt
            ? `<div class="alert alert-warning small mb-2 py-2">
              <i class="bi bi-camera-video-fill me-2"></i>
              <strong>Proctoring is active.</strong>
              Your camera will be used and the exam must remain
              fullscreen. Tab switching is monitored.
            </div>
            <button class="btn btn-primary w-100"
                    id="startExamBtn"
                    onclick="startExam(${examId})">
              <i class="bi bi-play-circle-fill me-2"></i>
              Start Exam
            </button>`
            : `<button class="btn btn-secondary w-100"
                    disabled>
              ${hasEnded ? 'Exam Closed' : 'Not Available Yet'}
            </button>`}`;

      } catch (err) {
        card.innerHTML = `
      <div class="text-center text-danger py-4 small">
        <i class="bi bi-exclamation-triangle fs-2
                  d-block mb-2"></i>
        ${_esc(err.detail || "Failed to load exam details.")}
      </div>`;
      }
    }

    // ── Start exam ────────────────────────────────────────────────────

    async function startExam(eid) {
      const btn = document.getElementById("startExamBtn");
      if (btn) { btn.disabled = true; btn.textContent = "Starting..."; }

      try {
        const data = await window.apiFetch(
          `/api/student/attempts?exam_id=${eid}`,
          { method: "POST" }
        );
        if (!data) return;

        // Clear polling
        if (pollTimer) clearInterval(pollTimer);

        // Navigate to exam attempt page
        window.location.href =
          `/static/pages/student/exam_attempt.html`
          + `?attempt_id=${data.attempt_id}&exam_id=${eid}`;

      } catch (err) {
        if (btn) {
          btn.disabled = false;
          btn.innerHTML =
            '<i class="bi bi-play-circle-fill me-2"></i>Start Exam';
        }
        document.getElementById("lobbyCard").insertAdjacentHTML(
          "beforeend",
          `<div class="alert alert-danger mt-2 small">
         ${_esc(err.detail || "Failed to start exam.")}
       </div>`
        );
      }
    }

    // ── Course exam list ──────────────────────────────────────────────

    async function loadCourseExams() {
      const list = document.getElementById("courseExamsList");
      try {
        const data = await window.apiFetch("/api/student/exams");
        if (!data) return;

        const filtered = courseId
          ? data.items.filter(e => e.course_id === courseId)
          : data.items;

        if (!filtered.length) {
          list.innerHTML = `
        <div class="col-12 text-center text-muted py-5">
          <i class="bi bi-calendar-x fs-2 d-block mb-2"></i>
          No upcoming exams for this course.
        </div>`;
          return;
        }

        list.innerHTML = filtered.map(e => `
      <div class="col-12 col-md-6">
        <div class="content-card h-100">
          <h6 class="fw-semibold mb-1">${_esc(e.title)}</h6>
          <div class="small text-muted mb-3">
            ${_esc(e.course_code)} ·
            ${e.duration_minutes}min ·
            ${e.total_marks} marks
          </div>
          <div class="small mb-3">
            <div class="text-muted">
              Start: ${new Date(e.start_time).toLocaleString()}
            </div>
            <div class="text-muted">
              End: ${new Date(e.end_time).toLocaleString()}
            </div>
          </div>
          ${e.has_attempted
            ? `<span class="badge bg-secondary-subtle
                            text-secondary">
                 Already Attempted
               </span>`
            : `<a href="/static/pages/student/exam_lobby.html?exam_id=${e.id}"
                 class="btn btn-primary btn-sm w-100">
                 View Lobby →
               </a>`}
        </div>
      </div>`).join("");

      } catch (err) {
        list.innerHTML = `
      <div class="col-12 text-danger text-center py-3 small">
        ${_esc(err.detail || "Failed to load exams.")}
      </div>`;
      }
    }

    function _esc(s) {
      return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>

</html>
