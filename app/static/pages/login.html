<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
  <script src="/static/js/theme.js"></script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - TestR</title>

  <!-- Google Fonts for Modern Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap 5.3 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    crossorigin="anonymous" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="/static/css/custom.css" />

  <style>
    /*
     * Premium Login UI
     */
    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      background-color: #ffffff;
      position: relative;
      overflow: hidden;


      transition: background-color 0.3s ease;
    }

    [data-bs-theme="dark"] body {
      background-color: #1e2024;
    }


    /* Floating Educational SVGs */
    .bg-symbols {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .bg-symbol {
      position: absolute;
      opacity: 0.08;
      color: #000;
      animation: float-slow 15s infinite ease-in-out alternate;
    }

    [data-bs-theme="dark"] .bg-symbol {
      opacity: 0.05;
      color: #fff;
    }

    .sym-1 {
      top: 15%;
      left: 15%;
      font-size: 4rem;
      animation-delay: 0s;
      transform: rotate(-15deg);
    }

    .sym-2 {
      top: 70%;
      left: 20%;
      font-size: 5rem;
      animation-delay: -3s;
      transform: rotate(10deg);
    }

    .sym-3 {
      top: 20%;
      right: 15%;
      font-size: 6rem;
      animation-delay: -7s;
      transform: rotate(25deg);
    }

    .sym-4 {
      top: 65%;
      right: 15%;
      font-size: 4.5rem;
      animation-delay: -11s;
      transform: rotate(-10deg);
    }

    /* Animations */
    @keyframes float {
      0% {
        transform: translate(0, 0);
      }

      100% {
        transform: translate(30px, -30px);
      }
    }

    @keyframes float-slow {
      0% {
        transform: translateY(0px) rotate(auto);
      }

      100% {
        transform: translateY(-20px) rotate(auto);
      }
    }

    /* Glassmorphism Card */
    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 0 15px;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 1.25rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02);
      padding: 2.5rem;
      transition: all 0.3s ease;
    }

    [data-bs-theme="dark"] .login-card {
      background: rgba(30, 41, 59, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    /* Typography & Alignments */
    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2rem;
    }

    .logo-circle {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      box-shadow: 0 8px 16px rgba(99, 102, 241, 0.25);
      color: white;
      font-size: 2rem;
    }

    .login-logo h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 0;
      color: var(--bs-heading-color);
    }

    .login-logo p {
      color: var(--bs-secondary-color);
      font-size: 0.9rem;
      margin: 0.25rem 0 0 0;
    }

    /* Input Fields */
    .input-group,
    .input-group-text,
    .form-control,
    .input-group .btn-outline-secondary {
      background-color: var(--bs-body-bg) !important;
    }

    /* Force WebKit AutoFill to match our dark/light theme */
    .form-control:-webkit-autofill,
    .form-control:-webkit-autofill:hover,
    .form-control:-webkit-autofill:focus,
    .form-control:-webkit-autofill:active {
      -webkit-box-shadow: 0 0 0 30px var(--bs-body-bg) inset !important;
      -webkit-text-fill-color: var(--bs-body-color) !important;
      transition: background-color 5000s ease-in-out 0s;
    }

    .input-group {
      border-radius: var(--bs-border-radius);
    }

    .input-group-text {
      border-right: none;
      color: var(--bs-tertiary-color);
      padding-right: 0.25rem;
    }

    .form-control {
      border-left: none;
    }

    .form-control:focus {
      box-shadow: none;
      border-color: var(--bs-border-color);
    }

    .input-group .btn-outline-secondary {
      border-color: var(--bs-border-color);
      color: var(--bs-tertiary-color);
      background-color: transparent;
    }

    .input-group .btn-outline-secondary:hover,
    .input-group .btn-outline-secondary:active,
    .input-group .btn-outline-secondary.active {
      background-color: transparent;
      color: var(--bs-body-color);
      border-color: var(--bs-border-color);
    }

    .input-group:focus-within {
      box-shadow: 0 0 0 0.25rem rgba(99, 102, 241, 0.2);
      border-radius: var(--bs-border-radius);
    }

    .input-group:focus-within .input-group-text,
    .input-group:focus-within .form-control,
    .input-group:focus-within .btn-outline-secondary {
      border-color: #6366f1;
    }

    /* Invalid Form State Styling */
    .was-validated .input-group:has(.form-control:invalid) .input-group-text,
    .was-validated .input-group:has(.form-control:invalid) .form-control,
    .was-validated .input-group:has(.form-control:invalid) .btn-outline-secondary {
      border-color: var(--bs-form-invalid-border-color, var(--bs-danger));
    }

    .was-validated .input-group:has(.form-control:invalid) .input-group-text,
    .was-validated .input-group:has(.form-control:invalid) .btn-outline-secondary i {
      color: var(--bs-form-invalid-border-color, var(--bs-danger));
    }

    .was-validated .input-group:has(.form-control:invalid):focus-within {
      box-shadow: 0 0 0 0.25rem rgba(220, 53, 69, 0.25);
      border-radius: var(--bs-border-radius);
    }

    .was-validated .form-control:invalid:focus {
      box-shadow: none !important;
    }

    .was-validated .form-control:invalid,
    .was-validated .form-control:valid,
    .form-control.is-invalid,
    .form-control.is-valid {
      background-image: none !important;
      padding-right: 0.75rem !important;
    }

    /* Button Premium */
    .btn-login {
      height: 3rem;
      font-weight: 600;
      font-size: 1rem;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border: none;
      border-radius: 0.75rem;
      transition: all 0.2s ease;
      color: white;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px -6px rgba(99, 102, 241, 0.6);
      color: white;
    }

    .btn-login:active {
      transform: translateY(0);
    }

    /* Theme Toggle */
    .theme-toggle-login {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 50;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--bs-border-color);
      background: var(--bs-body-bg);
      color: var(--bs-body-color);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .theme-toggle-login:hover {
      background: var(--bs-tertiary-bg);
    }
  </style>
</head>

<body>

  <!-- Educational Background Symbols -->
  <div class="bg-symbols">
    <!-- Mortarboard -->
    <i class="bi bi-mortarboard bg-symbol sym-1"></i>
    <!-- Book -->
    <i class="bi bi-book bg-symbol sym-2"></i>
    <!-- Clipboard/Exam -->
    <i class="bi bi-clipboard-check bg-symbol sym-3"></i>
    <!-- Pen -->
    <i class="bi bi-pen bg-symbol sym-4"></i>
  </div>

  <!-- Theme toggle -->
  <button class="theme-toggle-login" id="themeToggleBtn" aria-label="Toggle theme" title="Toggle light / dark mode">
    <i class="bi bi-moon-fill" id="themeIcon"></i>
  </button>

  <!-- Login card container -->
  <div class="login-container">
    <div class="login-card">

      <!-- Premium Logo Section -->
      <div class="login-logo">
        <div class="logo-circle">
          <i class="bi bi-journal-text"></i>
        </div>
        <h1>TestR</h1>
        <p>Examination Management System</p>
      </div>

      <!-- Alert area -->
      <div id="loginAlert" class="alert alert-danger d-none align-items-center gap-2" role="alert"
        style="border-radius:0.75rem;font-size:0.9rem;">
        <i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
        <span id="loginAlertMsg"></span>
      </div>

      <!-- Login form -->
      <form id="loginForm" novalidate>

        <!-- Email -->
        <div class="mb-3">
          <label for="emailInput" class="form-label fw-medium small text-muted">EMAIL ADDRESS</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="emailInput" name="email" placeholder="name@institute.edu"
              autocomplete="email" required />
          </div>
          <div class="invalid-feedback">Please enter a valid email.</div>
        </div>

        <!-- Password -->
        <div class="mb-4">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label for="passwordInput" class="form-label fw-medium small text-muted mb-0">PASSWORD</label>
          </div>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="passwordInput" name="password" placeholder="••••••••"
              autocomplete="current-password" required />
            <button type="button" class="btn btn-outline-secondary border-left-0"
              style="border-left:none; background:transparent;" id="togglePassword" tabindex="-1">
              <i class="bi bi-eye" id="togglePasswordIcon"></i>
            </button>
          </div>
          <div class="invalid-feedback">Please enter your password.</div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-login w-100" id="loginBtn">
          <span id="loginBtnText">Sign In</span>
          <span id="loginBtnSpinner" class="spinner-border spinner-border-sm d-none ms-2" role="status"
            aria-hidden="true"></span>
        </button>

      </form>

      <div class="mt-4 text-center">
        <a href="/static/pages/index.html#documentation" class="text-decoration-none small text-muted"
          style="transition: color 0.2s;">
          <i class="bi bi-question-circle me-1"></i> Need help signing in?
        </a>
      </div>

    </div>
  </div>


  <!-- Bootstrap 5.3 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- External Logic -->
  <script src="/static/js/login.js"></script>
</body>

</html>
